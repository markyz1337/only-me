<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Radio Player Premium Swipe</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}
* { 
    box-sizing: border-box; 
    margin:0; padding:0; 
    font-family:'Inter',sans-serif; 
    -webkit-tap-highlight-color:transparent; 
}

/* === ELIMINARE TOTALĂ BARE DE SCROLL === */
::-webkit-scrollbar { display: none; }
* {
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE/Edge */
}
.content::-webkit-scrollbar,
.header-tabs::-webkit-scrollbar { display: none; }

body { 
    background:var(--bg-dark); 
    color:white; 
    height:100dvh; 
    overflow:hidden; 
    display:flex; 
    justify-content:center; 
}
.app-container {
    width:100%; max-width:430px; height:100%; position:relative; overflow:hidden;
    display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom);
}

/* FUNDAL ANIMAT (vizibil) */
.bg-blur {
    position:absolute; top:-25%; left:-25%; width:150%; height:150%;
    background-size:cover; background-position:center;
    filter:blur(70px) brightness(0.4); background-repeat:no-repeat;
    z-index:0; will-change:opacity,transform;
    animation: bgBreathe 90s infinite ease-in-out;
    transition: opacity 1.5s cubic-bezier(0.4, 0.0, 0.2, 1);
}
#bg-layer-1 { opacity:1; animation-delay:0s; }
#bg-layer-2 { opacity:0; animation-delay:45s; }

@keyframes bgBreathe {
    0%   { transform: rotate(30deg) scale(1.00) translate(0%, 0%); }
    20%  { transform: rotate(30deg) scale(1.08) translate(4%, -3%); }
    40%  { transform: rotate(30deg) scale(1.15) translate(-3%, 4%); }
    60%  { transform: rotate(30deg) scale(1.11) translate(3%, 1%); }
    80%  { transform: rotate(30deg) scale(1.06) translate(-4%, -2%); }
    100% { transform: rotate(30deg) scale(1.00) translate(0%, 0%); }
}

.header-tabs { position:relative; z-index:10; padding:20px 20px 10px; display:flex; gap:10px; overflow-x:auto; }
.tab { background:var(--glass); padding:8px 18px; border-radius:20px; font-size:13px; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); cursor:pointer; white-space:nowrap; }
.tab.active { background:var(--accent); border-color:transparent; }
.content { position:relative; z-index:10; flex:1; padding:0 20px 140px 20px; overflow-y:auto; }
.station-item { display:flex; align-items:center; padding:15px 0; border-bottom:0.5px solid rgba(255,255,255,0.1); cursor:pointer; }
.station-thumb { width:55px; height:55px; border-radius:12px; margin-right:15px; object-fit:cover; background:#111; }
.station-name { font-weight:600; font-size:16px; margin-bottom:4px; }
.station-desc { font-size:11px; color:#b3b3b3; text-transform:uppercase; }
#player-view { display:none; position:relative; z-index:10; height:100%; flex-direction:column; align-items:center; justify-content:center; padding:20px 0 100px 0; touch-action:pan-y; }
.art-container { width:100%; display:flex; justify-content:center; margin-bottom:30px; }
.main-art { width:280px; height:280px; border-radius:25px; box-shadow:0 25px 50px rgba(0,0,0,0.6); object-fit:cover; background:#111; transition:transform .6s ease, opacity .6s ease; }
.track-viewport { width:100%; overflow:hidden; margin-bottom:30px; position:relative; }
.track-slider-wrapper { display:flex; width:300%; transform:translateX(-33.333%); transition:transform .3s ease-out; will-change:transform; }
.track-info-slide { width:33.333%; text-align:center; padding:0 40px; flex-shrink:0; }
.track-info-slide h2 { font-size:22px; font-weight:600; margin-bottom:8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.track-info-slide p { color:#b3b3b3; font-size:14px; text-transform:uppercase; }
.main-controls { display:flex; align-items:center; gap:30px; margin-bottom:20px; }
.btn-round { background:var(--glass); width:55px; height:55px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); color:white; }
.btn-play { background:#fff; color:#000; width:70px; height:70px; }
.btn-play.playing { background:var(--accent); color:#fff; }
.nav-bar { position:absolute; bottom:calc(15px + env(safe-area-inset-bottom)); left:20px; right:20px; z-index:50; background:rgba(20,20,20,0.85); backdrop-filter:blur(25px); border-radius:40px; display:flex; justify-content:space-around; padding:8px; border:1px solid rgba(255,255,255,0.1); }
.nav-link { display:flex; flex-direction:column; align-items:center; gap:3px; padding:2% 20%; border-radius:50px; color:#777; cursor:pointer; font-size:11px; }
.nav-link.active { color:#fff; background:rgba(255,255,255,0.08); }
.nav-link.active i { color:var(--accent); }
.fab { position:absolute; bottom:calc(100px + env(safe-area-inset-bottom)); right:25px; background:var(--accent); width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(255,94,58,0.4); z-index:15; }
</style>
</head>
<body>
<div class="app-container">
    <div class="bg-blur" id="bg-layer-1"></div>
    <div class="bg-blur" id="bg-layer-2"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab active">Favorites</div>
            <div class="tab">Recent</div>
            <div class="tab">All</div>
        </div>
        <div class="content" id="stations-list"></div>
        <div class="fab" onclick="alert('Adaugă post')"><i data-lucide="plus"></i></div>
    </div>

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art" id="player-img" onerror="this.src=FALLBACK_IMG">
        </div>
        <div class="track-viewport" id="swipe-zone-text">
            <div class="track-slider-wrapper" id="info-wrapper">
                <div class="track-info-slide" id="slide-prev"><h2>Nume Post</h2><p>Gen Muzical</p></div>
                <div class="track-info-slide" id="slide-current"><h2>Selectează Post</h2><p>Apasă pe o stație</p></div>
                <div class="track-info-slide" id="slide-next"><h2>Nume Post</h2><p>Gen Muzical</p></div>
            </div>
        </div>
        <div class="main-controls">
            <div class="btn-round" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')"><i data-lucide="radio"></i><span>Radio</span></div>
        <div class="nav-link" id="nav-player" onclick="switchTab('player')"><i data-lucide="play-circle"></i><span>Player</span></div>
    </div>
</div>

<audio id="audio-engine"></audio>

<script>
const FALLBACK_IMG = "https://store-images.s-microsoft.com/image/apps.54675.13982720394888960.16320d2b-98f6-4b3b-af8d-f33140cf192a.778f4c59-a76c-44c0-82f7-bd7357649848";

const stations = [
    { name: "ONE FM DANCE", stream: "https://live.onefm.ro/onefm.aacp", img: "https://onefm.es/wp-content/uploads/2023/09/LOGO-2025.jpg", desc: "DANCE,
