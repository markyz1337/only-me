<link rel="apple-touch-icon" href="icon-180.png">

<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

.bg-blur, .main-art {
    will-change: transform, opacity;
    contain: paint;
}


/* Previne flash-ul de conținut la încărcare */
.app-container {
    opacity: 0;
    transition: opacity 0.3s ease-in;
}
.app-ready .app-container {
    opacity: 1;
}


.fade-text {
    transition: opacity 0.5s ease-in-out;
}



/* Doar emoji-ul va face fade, textul "Hope" rămâne fix */
#slide-current h2 span {
    transition: opacity 0.6s ease-in-out;
    display: inline-block;
    will-change: opacity;
}

.fade-out-emoji {
    opacity: 0 !important;
}


/* Stiluri pentru Egalizatorul din Listă */
.playing-icon {
    display: none;
    align-items: flex-end;
    gap: 2px;
    width: 20px;
    height: 20px;
    margin-left: 10px;
}

.station-item.is-playing .playing-icon {
    display: flex;
}

.playing-icon span {
    display: inline-block;
    width: 3px;
    background: linear-gradient(to top, var(--accent), #ff9d85); 
    border-radius: 2px;
    animation: bounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 3px var(--accent), 0 0 5px rgba(255, 94, 58, 0.4);
}

.station-item.is-playing .station-name {
    color: var(--accent);
    text-shadow: 0 0 25px var(--accent), 0 0 6px rgba(255, 94, 58, 0.2);
    transition: all 0.4s ease;
}

.playing-icon span:nth-child(2) { animation-duration: 0.7s; }
.playing-icon span:nth-child(3) { animation-duration: 0.6s; }

@keyframes bounce {
    from { height: 5px; }
    to { height: 18px; }
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    display: flex; 
    justify-content: center;
    touch-action: pan-y;
}

.player-yt-link {
    position: absolute;
    right: 11px;
    bottom: 11px;
    z-index: 35;
    display: flex;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    border-radius: 16px;
    padding: 4px;
    transition: transform 0.3s ease, opacity 0.5s ease, visibility 0.5s ease;
    opacity: 0.8;
    visibility: visible;
    text-decoration: none;
}

.player-yt-link img {
    width: 29px;
    height: 29px;
    display: block;
    object-fit: contain;
}

.player-yt-link:active {
    transform: scale(0.9);
}

.yt-hidden {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none;
    transform: scale(0.7);
}

.app-container {
    width: 100%; max-width:385px; height: 100.1%; position: relative;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; 
    background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; 
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }

.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px 140px 20px; 
    overflow-y: auto; 
    overscroll-behavior-y: contain; 
    -webkit-overflow-scrolling: touch; 
}

.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}


.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    cursor: pointer; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { 
    font-weight: 600; 
    font-size: 16px; 
    margin-bottom: 4px; 
}

.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 250px; height: 250px; position: relative; margin-bottom: 25px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { 
    font-size: 24px; 
    font-weight: 600; 
    margin-bottom: 8px; 
    
    /* Permite maximum 2 rânduri */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;  
    overflow: visible; /* Schimbat din hidden în visible pentru a nu tăia glifele */
    
    /* Centrare și spațiere */
    line-height: 1.3; /* Crescut de la 1.2 la 1.3 */
    max-height: 2.6em; 
    white-space: normal; 
    text-overflow: ellipsis;
    
    /* FIX pentru litere tăiate la margine */
    padding: 0 4px; 
    box-sizing: border-box;
}

.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); transform: scale(1.05); }
    50% { box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); transform: scale(1.10); }
}

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.7); /* Fundal mai opac la start */
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px); /* Fix pentru Safari/iOS */
    border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; 
    border: 1px solid rgba(255,255,255,0.08); 
    
    /* Adaugă aceste linii pentru animație */
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

/* Clasa care va fi activată din JS */
.nav-bar.visible {
    opacity: 1;
    transform: translateY(0);
}


.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; 
    color: #000;      
    width: 56px; 
    cursor: pointer;
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    
    /* Starea inițială pentru animație */
    opacity: 0;
    transform: translateY(20px) scale(0.8);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.6s ease-out, 
                transform 0.9s cubic-bezier(0.23, 1, 0.32, 1);
}

/* Clasa care va declanșa apariția */
.fab.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* Păstrăm efectul de puls neschimbat, dar adăugăm .visible pentru siguranță */
.fab.playing.visible {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
}


.fab.playing {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}
</style>
</head>

        <div class="track-viewport" id="swipe-zone-text">

        <div class="main-controls">

            <div class="btn-round" id="btn-next" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>

/** --- ENGINE DE CURĂȚARE TEXT (ULTRA SCRUBBER v8.1) --- **/
function fixEncoding(str) {
    if (!str) return "";
    try {
        // Dacă conține deja caractere chirilice, nu forțăm re-encodarea (evităm distrugerea textului)
        if (/[а-яА-ЯёЁ]/.test(str)) return str;
        // Altfel, încercăm să reparăm diacriticele românești (mojibake)
        return decodeURIComponent(escape(str));
    } catch (e) { return str; }
}

function decodeEntities(str) {
    if (!str) return "";
    const txt = document.createElement("textarea");
    txt.innerHTML = str;
    return txt.value;
}

function fixCase(str) {
    // Dacă tot textul e CAPS, îl facem Sentence case pentru aspect premium
    if (str.length > 2 && str === str.toUpperCase()) {
        return str.charAt(0) + str.slice(1).toLowerCase();
    }
    return str;
}

function removeDuplicateNames(text) {
    let parts = text.split(/[,，|\-\u2013\u2014\/]|feat\.|ft\.|&| x /gi);
    let cleanParts = [];
    let seenNormalized = [];

    parts.forEach(p => {
        let original = fixCase(p.trim().replace(/\s+/g, ' '));
        // Normalizăm păstrând caracterele alfanumerice chirilice și latine
        let norm = original.toLowerCase()
                           .normalize("NFD")
                           .replace(/[\u0300-\u036f]/g, "")
                           .replace(/[^a-z0-9а-яё]/gi, "");

        if (norm.length < 2) return;
        let isDuplicate = seenNormalized.some(prev => norm.includes(prev) || prev.includes(norm));
        if (!isDuplicate) {
            seenNormalized.push(norm);
            cleanParts.push(original);
        }
    });
    return cleanParts.join(' - ');
}

function analyticalClean(artist, title) {
    let a = decodeEntities(fixEncoding(artist || "")).trim();
    let t = decodeEntities(fixEncoding(title || "")).trim();

    const garbage = [/Official\s*Video/gi, /Official\s*Audio/gi, /Cat\s*Music/gi, /Roton\s*Music/gi, /Global\s*Records/gi, /Premiere/gi, /Lyrics/gi, /Video/gi, /Audio/gi, /Muzica/gi, /HD/gi, /Radio\s*Edit/gi];

    // Elimină parantezele ( ) [ ] { }
    let cleanA = a.replace(/\(.*?\)|\[.*?\]|\{.*?\}/g, "");
    let cleanT = t.replace(/\(.*?\)|\[.*?\]|\{.*?\}/g, "");
    
    garbage.forEach(word => {
        cleanA = cleanA.replace(word, "");
        cleanT = cleanT.replace(word, "");
    });

    let rawCombined = (cleanA && cleanT) ? `${cleanA} - ${cleanT}` : (cleanA || cleanT);
    let final = removeDuplicateNames(rawCombined);

    return final.replace(/\s+/g, ' ')
                .replace(/\s*-\s*-+\s*/g, ' - ')
                .replace(/-+/g, '-')
                .replace(/^[\s\-\.\/]+|[\s\-\.\/]+$/g, "")
                .trim() || "Live Stream";
}

const hopeEmojis = ["🌅", "💛", "🥰", "❤️‍🔥", "💗", "💞", "✨", "⭐️", "🌙", "🌕", "🌼", "🌸", "🐝", "🌷", "🪐", "💫", "🌠", "🌌", "🌇", "🌃", "🌆", "💒"];
let lastHopeEmoji = ""; 
let emojiInterval = null; 

function rotateHopeEmoji() {
    let availableEmojis = hopeEmojis.filter(e => e !== lastHopeEmoji);
    const newEmoji = availableEmojis[Math.floor(Math.random() * availableEmojis.length)];
    lastHopeEmoji = newEmoji;

    // 1. Update în LISTĂ
    const listItemName = document.querySelector(`.station-item[data-name="Hope"] .station-name`);
    if (listItemName) {
        let listEmojiSpan = listItemName.querySelector('.list-hope-emoji');
        if (!listEmojiSpan) {

            listEmojiSpan = listItemName.querySelector('.list-hope-emoji');
        }
        listEmojiSpan.style.opacity = "0";
        setTimeout(() => {
            if(listEmojiSpan) {
                listEmojiSpan.innerText = newEmoji;
                listEmojiSpan.style.opacity = "1";
            }
        }, 650); 
    }

    // 2. Update în PLAYER (Fix pentru "ope" și dispariție)
    const isHopeActive = activeStationObject && activeStationObject.name === "Hope";
    if (isHopeActive) {
        const titleEl = document.querySelector('#slide-current h2');
        if (titleEl) {
            let playerEmojiSpan = titleEl.querySelector('span');
            
            // Verificăm dacă textul "Hope" există, dacă nu, îl resetăm corect

                titleEl.innerHTML = `Hope <span style="transition: opacity 0.6s ease-in-out; display: inline-block; margin-left: 5px;">${newEmoji}</span>`;
                playerEmojiSpan = titleEl.querySelector('span');
            } 
            // Dacă span-ul lipsește dar cuvântul Hope e acolo
            else if (!playerEmojiSpan) {
                titleEl.textContent = "Hope "; 
                playerEmojiSpan = document.createElement('span');
                playerEmojiSpan.style.transition = "opacity 0.6s ease-in-out";
                playerEmojiSpan.style.display = "inline-block";
                playerEmojiSpan.style.marginLeft = "5px";
                titleEl.appendChild(playerEmojiSpan);

            playerEmojiSpan.style.opacity = "0";
            setTimeout(() => {
                if(playerEmojiSpan) {
                    playerEmojiSpan.innerText = newEmoji;
                    playerEmojiSpan.style.opacity = "1";
                }
            }, 650);
        }
    }
}


function checkHopeEffect() {
    const isHope = activeStationObject && activeStationObject.name === "Hope";

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3 || title === "Live Stream") return;

    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        
        if (data.results && data.results.length > 0) {
            const highResImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            
            // Salvăm în obiect
            stationRef.img = highResImg;
            
            // Update imagine în LISTĂ (vizibil imediat)

            }

            // Update în PLAYER dacă este postul activ

                updateArtUI(highResImg);
                updateMediaSession();
            }
        }
    } catch (e) { 
        console.log("iTunes Sync Error"); 
    }
}





async function fetchMetadata(url, station) {
    if (url.includes("emisiunivechi")) return;

    let newTitle = "";

    if (url.includes("sergiumusic.duckdns.org")) {
        try {
            const mountPoint = url.split('/').pop();
            const response = await fetch("https://sergiumusic.duckdns.org/status-json.xsl");
            const data = await response.json();
            if (data.icestats && data.icestats.source) {
                let sources = Array.isArray(data.icestats.source) ? data.icestats.source : [data.icestats.source];
                let sData = sources.find(s => s.listenurl.includes(mountPoint));
                if (sData) newTitle = analyticalClean(sData.artist, sData.title);
            }
        } catch (e) { console.error("Error owned meta:", e); }
    } else {
        try {
            const response = await fetch(url, { headers: { "Icy-MetaData": "1" } });
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            const metaInt = parseInt(response.headers.get("icy-metaint"));
            if (metaInt) {
                let buffer = new Uint8Array();
                let bytesRead = 0;
                while (bytesRead < metaInt + 500) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    let temp = new Uint8Array(buffer.length + value.length);
                    temp.set(buffer); temp.set(value, buffer.length); buffer = temp;
                    bytesRead += value.length;
                    if (buffer.length >= metaInt + 1) {
                        let mLen = buffer[metaInt] * 16;
                        if (buffer.length < metaInt + 1 + mLen) continue;
                        let mStr = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + mLen));
                        let match = mStr.match(/StreamTitle='([^']*)'/);
                        if (match && match[1]) newTitle = match[1].replace(/;/g, "").trim();
                        break;
                    }
                }
                reader.cancel();
            }
        } catch(e) { console.log("Error external meta"); }
    }

    if (newTitle && station.desc !== newTitle) {
        station.desc = newTitle;
        updateStationUI(station.name, newTitle);
        // Căutăm coperta imediat ce avem titlul
        fetchAlbumArt(newTitle, station);
    }
}

function loadStationInfo(idx, sp = true, skipArt = false, isInitial = false) {
    if (currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];
    
    if (sp) stations.forEach(st => st.isInitialBgSource = false);
    activeStationObject = s;

    const isPlayerVisible = document.getElementById('player-view').style.display === 'flex';
    if (ENABLE_DIRECT_LINKS && sp && isPlayerVisible) {
        const cleanName = transliterate(s.name).toLowerCase().replace(/\s+/g, '');
        window.history.replaceState({}, "", "/" + cleanName);
    }

    // LOGICA DE IMAGINI:
    if (isInitial) {
        // La pornirea automată: Schimbăm DOAR coperta mică din Player, NU și fundalul blurat
        const art1 = document.getElementById('player-img-1');
        const art2 = document.getElementById('player-img-2');
        if (activeArtLayer === 1) {
            art1.src = s.img || FALLBACK_IMG;
        } else {
            art2.src = s.img || FALLBACK_IMG;
        }
    } else {
        // La schimbare manuală: Schimbăm TOT (copertă + fundal blurat)
        if (sp || !skipArt) updateArtUI(s.img || FALLBACK_IMG);
    }
    
    const ytBtn = document.getElementById('player-yt-btn');
    if (s.yt) { 
        ytBtn.href = s.yt; 
        ytBtn.classList.remove('yt-hidden'); 
    } else { 
        ytBtn.classList.add('yt-hidden'); 
    }

    if (metadataInterval) clearInterval(metadataInterval);
    audio.src = s.stream;

    setTimeout(() => { 
        fetchMetadata(s.stream, s); 
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000); 
    }, 3000);

    if(sp) { 
        updateUI('loading'); 
        audio.play().catch(() => updateUI(false)); 
    }
    updateMediaSession();
}

function updateUI(state) { 
    const b = document.getElementById('play-trigger');
    const f = document.getElementById('fab-play-pause');
    if(!b && !f) return;
    const icons = { play: 'play', pause: 'pause', loading: 'loader-2' };
    let currentIcon = state === 'loading' ? icons.loading : (state === true ? icons.pause : icons.play);
    [b, f].forEach(el => {
        if(!el) return;
        el.innerHTML = `<i data-lucide="${currentIcon}" ${currentIcon === 'loader-2' ? 'class="spin"' : 'fill="currentColor"'} ></i>`;
        state === true ? el.classList.add('playing') : el.classList.remove('playing');
    });
    document.querySelectorAll('.station-item').forEach(item => {
        item.classList.toggle('is-playing', (state === true || state === 'loading') && activeStationObject && item.getAttribute('data-name') === activeStationObject.name);
    });

    lucide.createIcons();
}

function updateMediaSession() {
    if ('mediaSession' in navigator && activeStationObject) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: activeStationObject.desc || "Live",
            artist: activeStationObject.name,
            album: "Sergiu FM",
            artwork: [
                { 
                    src: activeStationObject.img || FALLBACK_IMG, 
                    sizes: '512x512', 
                    type: 'image/png' 
                }
            ]
        });

        // --- ADAUGĂ ACESTE LINII PENTRU CONTROLUL DIN EXTERIOR ---
        
        // Butonul de Play
        navigator.mediaSession.setActionHandler('play', () => {
            audio.play();
            updateUI(true);
        });

        // Butonul de Pause
        navigator.mediaSession.setActionHandler('pause', () => {
            audio.pause();
            updateUI(false);
        });

        // Butonul de Next (Următorul post)
        navigator.mediaSession.setActionHandler('nexttrack', () => {
            next(); // Apelează funcția ta existentă
        });

        // Butonul de Previous (Postul anterior)
        navigator.mediaSession.setActionHandler('previoustrack', () => {
            prev(); // Apelează funcția ta existentă
        });
        
        // Opțional: Oprire (Stop)
        navigator.mediaSession.setActionHandler('stop', () => {
            audio.pause();
            updateUI(false);
        });
    }
}

function animateTransition(dir) {
    if (isTransitioning) return;
    isTransitioning = true; 
    
    wrapper.style.transition = 'transform 0.5s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir === 'next' ? 'translateX(-66.666%)' : 'translateX(0)';

    const onEnd = () => {
        wrapper.removeEventListener('transitionend', onEnd);
        wrapper.style.transition = 'none'; 
        
        // Actualizăm datele postului (sunet + text)
        loadStationInfo(currentIdx, true, false); 
        updateSliderText(); 
        
        // Resetăm slider-ul pe centru
        wrapper.style.transform = 'translateX(-33.333%)'; 
        
        // Deblocăm după o mică pauză pentru a preveni suprapunerea evenimentelor
        setTimeout(() => { 
            isTransitioning = false; 
        }, 50);
    };

    wrapper.addEventListener('transitionend', onEnd);
}





function updateSliderText() {
    if (currentFilteredList.length === 0) return;
    const ids = ['slide-prev', 'slide-current', 'slide-next'];
    const indices = [(currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length, currentIdx, (currentIdx + 1) % currentFilteredList.length];
    
    ids.forEach((id, i) => {
        const el = document.getElementById(id);
        const data = currentFilteredList[indices[i]];
        const h2 = el.querySelector('h2');
        
        if (data.name === "Hope") {
            // Dacă titlul nu conține deja "Hope", îl setăm. 
            // Nu folosim innerText gol pentru a nu șterge span-ul de emoji dacă e prezent
            if (!h2.textContent.includes("Hope")) {
                h2.innerText = "Hope";
            }
        } else {
            h2.innerText = data.name;
        }
        el.querySelector('p').innerText = data.desc;
    });
}


function transliterate(t) {
    if (!t) return "";
    let r = t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const map = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
    r = r.split('').map(c => map[c] || c).join('');
    return r.replace(/[^a-z0-9]/g, '');
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e => { 
            if (isTransitioning) return; // Blochează swipe dacă se mișcă deja
            startX = e.touches[0].clientX; 
            isDragging = true; 
            wrapper.style.transition = 'none'; 
        }, {passive: true});

        z.addEventListener('touchmove', e => { 
            if (!isDragging || isTransitioning) return; 
            const d = e.touches[0].clientX - startX; 
            wrapper.style.transform = `translateX(calc(-33.333% + ${(d / window.innerWidth) * 33}%))`; 
        }, {passive: true});

        z.addEventListener('touchend', e => { 
            if (!isDragging || isTransitioning) return; 
            isDragging = false;
            const d = e.changedTouches[0].clientX - startX;
            if (d > 60) prev(); 
            else if (d < -60) next(); 
            else { 
                wrapper.style.transition = 'transform 0.4s ease'; 
                wrapper.style.transform = 'translateX(-33.333%)'; 
            }
        });
    });
}


function setupFabSwipe() {
    const fab = document.getElementById('fab-play-pause');
    let fSX, fSY;
    
    fab.addEventListener('touchstart', e => { 
        fSX = e.touches[0].clientX; 
        fSY = e.touches[0].clientY; 
    }, {passive: true});

    fab.addEventListener('touchend', e => {
        const dX = e.changedTouches[0].clientX - fSX;
        const dY = e.changedTouches[0].clientY - fSY;
        
        // Prag minim de 30px pentru a ignora atingerile accidentale
        if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
            let direction = '';
            
            // Swipe JOS sau STÂNGA = NEXT
            if (dY > 30 || dX < -30) {
                next();
                direction = 'skip-forward';
            } 
            // Swipe SUS sau DREAPTA = PREV
            else if (dY < -30 || dX > 30) {
                prev();
                direction = 'skip-back';
            }

            if (direction) {
                updateFabVisuals(direction);
                if (navigator.vibrate) navigator.vibrate(40);
            }
        }
    }, {passive: true});
}

function updateFabVisuals(iconName) {
    const fab = document.getElementById('fab-play-pause');
    
    // 1. Schimbăm iconița imediat (Skip)
    fab.innerHTML = `<i data-lucide="${iconName}"></i>`;
    lucide.createIcons();
    
    // 2. Adăugăm un efect vizual de feedback (opțional, dar ajută)
    fab.style.transform = 'scale(0.85)';
    
    // 3. Revenim la starea normală (Play/Pause) după 800ms
    setTimeout(() => {
        const stateIcon = !audio.paused ? 'pause' : 'play';
        fab.innerHTML = `<i data-lucide="${stateIcon}" fill="currentColor"></i>`;
        lucide.createIcons();
        fab.style.transform = ''; // Revenim la scara normală (sau cea de puls)
    }, 800);
}



async function updateAllOwnedStations() {
    try {
        const response = await fetch("https://sergiumusic.duckdns.org/status-json.xsl");
        const data = await response.json();
        
        if (!data.icestats || !data.icestats.source) return;
        let sources = Array.isArray(data.icestats.source) ? data.icestats.source : [data.icestats.source];

        stations.forEach(station => {
            if (station.stream.includes("sergiumusic.duckdns.org") && !station.stream.includes("emisiunivechi")) {
                const mountPoint = station.stream.split('/').pop();
                const sData = sources.find(s => s.listenurl.includes(mountPoint));

                if (sData) {
                    const cleanTitle = analyticalClean(sData.artist, sData.title);
                    
                    // Verificăm dacă titlul s-a schimbat
                    if (station.desc !== cleanTitle) {
                        station.desc = cleanTitle; 
                        updateStationUI(station.name, cleanTitle);
                        
                        // 🔥 ACEASTA ESTE CHEIA: Căutăm coperta imediat ce titlul s-a schimbat
                        fetchAlbumArt(cleanTitle, station);
                    }
                }
            }
        });
        
        updateSliderText();
        
    } catch (e) { console.error("Update Error:", e); }
}





/** --- FUNCȚIE PENTRU FUNDAL RANDOM LA PORNIRE --- **/
async function applyRandomItunesCover() {
    const keywords = ["Hits 2026", "Dance Music", "Pop Hits", "Top Charts", "Summer Vibes", "Deep House"];
    const randomKey = keywords[Math.floor(Math.random() * keywords.length)];
    
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(randomKey)}&entity=song&limit=20`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const randomTrack = data.results[Math.floor(Math.random() * data.results.length)];
            const highResImg = randomTrack.artworkUrl100.replace('100x100bb.jpg', '1000x1000bb.jpg');
            
            const bg1 = document.getElementById('bg-layer-1');
            const art1 = document.getElementById('player-img-1');
            
            if (bg1) {
                bg1.style.backgroundImage = `url(${highResImg})`;
                bg1.style.opacity = "1";
            }
            if (art1) {
                art1.src = highResImg;
            }
        }
    } catch (e) {
        console.log("Eroare fundal:", e);
        document.getElementById('bg-layer-1').style.opacity = "1";
    }
}

function updateStationUI(name, desc) {
    // Update în listă
    const items = document.querySelectorAll(`.station-item[data-name="${name}"]`);
    items.forEach(item => {
        const dEl = item.querySelector('.station-desc');
        if (dEl) dEl.innerText = desc;
    });

    // Update în Player dacă e activ
    if (activeStationObject && activeStationObject.name === name) {
        const pDesc = document.querySelector('#slide-current p');
        if (pDesc) pDesc.innerText = desc;
    }
}




async function init() {
    const navBar = document.getElementById('main-nav');
    const fab = document.getElementById('fab-play-pause');

    const queryString = window.location.search.substring(1); 
    const pathSegments = window.location.pathname.split('/').filter(s => s.length > 0);
    const lastPathSegment = pathSegments.pop();
    const rawTarget = decodeURIComponent(queryString || lastPathSegment || "");
    
    let autoFound = null;
    if (rawTarget && ENABLE_DIRECT_LINKS) {
        const cleanTarget = transliterate(rawTarget).toLowerCase().replace(/\s+/g, '');
        autoFound = stations.find(s => {
            const cleanStationName = transliterate(s.name).toLowerCase().replace(/\s+/g, '');
            return cleanStationName === cleanTarget;
        });
    }

    // 1. PUNEM FUNDALUL RANDOM ÎNTÂI
    await applyRandomItunesCover();

    if (autoFound) {
        const isActuallyMine = autoFound.isMine === true;
        if (isActuallyMine) {
            renderList('mine', document.getElementById('tab-mine'));
        } else {
            renderList('all', document.getElementById('tab-all'));
        }
        currentIdx = currentFilteredList.findIndex(s => s.name === autoFound.name);
        if (currentIdx === -1) currentIdx = 0;

        switchTab('player');
        // Aici lăsăm isInitial false pentru că userul a venit pe un link specific, vrea imaginea postului
        loadStationInfo(currentIdx, true, false, false);
    } else {
        renderList('mine', document.getElementById('tab-mine'));
        currentIdx = 0;
        
        // 2. PORNIRE SILENȚIOASĂ (Păstrează fundalul random)
        loadStationInfo(currentIdx, true, false, true); 
        
        if (ENABLE_DIRECT_LINKS) {
            window.history.replaceState({}, "", "/");
        }
    }

    document.body.classList.add('app-ready');

    setTimeout(() => {
        if (navBar) navBar.classList.add('visible');
        const isListVisible = document.getElementById('list-view').style.display !== 'none';
        if (fab && isListVisible) {
            fab.classList.add('visible');
        }
    }, 400);

    updateSliderText();
    setupSwipe();
    setupFabSwipe();
    await updateAllOwnedStations(); 

    stations.forEach((s, i) => {
        if (!s.stream.includes("sergiumusic.duckdns.org")) {
            setTimeout(() => fetchMetadata(s.stream, s), i * 150);
        }
    });

    setInterval(() => {
        updateAllOwnedStations();
        stations.forEach((s, i) => {
            if (!s.stream.includes("sergiumusic.duckdns.org")) {
                setTimeout(() => fetchMetadata(s.stream, s), i * 200);
            }
        });
    }, 20000);

    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
}




init();
</script>
