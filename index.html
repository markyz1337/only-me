<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; 
    display: flex; 
    justify-content: center;
    touch-action: pan-y; 
}

.fab.playing {
    background: var(--accent);
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 2s infinite ease-in-out;
}



.app-container {
    width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; will-change: opacity, transform;
    animation: bgBreathe 30s infinite ease-in-out;
    transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#bg-layer-1 { opacity: 1; }
#bg-layer-2 { opacity: 0; }

@keyframes bgBreathe {
    0%, 100!% { transform: scale(1.0) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }

.content { position: relative; z-index: 10; flex: 1; padding: 0 20px 140px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

.owned-yt-btn {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    margin-left: 10px;
    cursor: pointer;
    transition: transform 0.2s ease;
}
.owned-yt-btn:active { transform: scale(0.85); }
.owned-yt-btn img {
    width: 30px; height: 30px;
    object-fit: contain; opacity: 0.80; 
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { 
        box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); 
        transform: scale(1.05); 
    }
    50% { 
        box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); 
        transform: scale(1.10); /* O ușoară mărire suplimentară la mijlocul pulsului */
    }
}


.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
}
.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

/* Stilul de bază pentru FAB (stare de pauză) */
.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; /* Fundal alb la pauză, ca în player */
    color: #000;      /* Iconiță neagră */
    width: 56px; 
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Starea de Play pentru FAB */
.fab.playing {
    background: var(--accent); /* Culoarea portocalie */
    color: #fff;               /* Iconiță albă */
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}


</style>
</head>

stations.forEach(s => { s.originalDesc = s.desc; s.originalImg = s.img; s.currentTrack = ""; });

function init() {
    renderList('fav', document.getElementById('tab-fav')); 
    updateSliderText();
    loadStationInfo(0, false);
    setupSwipe();
    scanAllStations();
    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
}

function updateMediaSession(station) {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: station.desc,
            artist: station.name,
            album: "Sergiu FM",
            artwork: [{ src: station.img || FALLBACK_IMG, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
    }
}

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    const fab = document.getElementById('fab-play-pause');
    list.innerHTML = "";
    
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    
    // LOGICA NOUĂ: Ascunde butonul dacă suntem în modul 'mine' (Owned)
    if (mode === 'mine') {
        fab.style.display = 'none';
    } else {
        fab.style.display = 'flex';
    }

    currentFilteredList = stations.filter(s => {
        if (mode === 'all') return s.isAll === true; 
        if (mode === 'fav') return s.isFav;
        if (mode === 'russian') return s.isRussian;
        if (mode === 'mine') return s.isMine;
        return false;
    });

    currentFilteredList.forEach((s) => {
        const item = document.createElement('div');
        item.className = 'station-item';
        item.setAttribute('data-name', s.name); 
        
        let ownedControl = '';
        // MODIFICARE: Verificăm dacă suntem în modul 'mine' ȘI dacă stația are link YT
        if (mode === 'mine' && s.yt) {
            ownedControl = `<div class="owned-yt-btn" onclick="event.stopPropagation(); window.open('${s.yt}', '_blank');"><img src="https://cdn-icons-png.flaticon.com/512/10308/10308828.png"></div>`;
        }
        
        item.innerHTML = `<img src="${s.img || FALLBACK_IMG}" class="station-thumb"><div style="flex:1"><div class="station-name">${s.name}</div><div class="station-desc">${s.desc}</div></div>${ownedControl}`;
        
        item.onclick = () => { 
            currentIdx = currentFilteredList.indexOf(s); 
            playStation(); 
        };
        list.appendChild(item);
    });
    lucide.createIcons();
}


function switchTab(t) {
    const nav = document.getElementById('main-nav');
    const fab = document.getElementById('fab-play-pause');
    
    if(t==='list'){ 
        document.getElementById('list-view').style.display='flex'; 
        document.getElementById('player-view').style.display='none';
        document.getElementById('nav-list').classList.add('active'); 
        document.getElementById('nav-player').classList.remove('active'); 
        nav.className = 'nav-bar on-radio';

        // --- CODUL NOU ESTE AICI ---
        const isMineActive = document.getElementById('tab-mine').classList.contains('active');
        fab.style.display = isMineActive ? 'none' : 'flex';
        // ---------------------------
        
    } else { 
        document.getElementById('list-view').style.display='none'; 
        document.getElementById('player-view').style.display='flex';
        document.getElementById('nav-list').classList.remove('active'); 
        document.getElementById('nav-player').classList.add('active'); 
        nav.className = 'nav-bar on-player';
        fab.style.display = 'none';
    }
}



function updateUI(state){ 
    const b = document.getElementById('play-trigger'); // Butonul din Player
    const f = document.getElementById('fab-play-pause'); // Butonul FAB din Listă
    if(!b && !f) return;
    
    let iconPlay = '<i data-lucide="play" fill="currentColor"></i>';
    let iconPause = '<i data-lucide="pause" fill="currentColor"></i>';
    let iconLoad = '<i data-lucide="loader-2" class="spin"></i>';

    if(state === 'loading') { 
        if(b) { b.innerHTML = iconLoad; b.classList.remove('playing'); }
        if(f) { f.innerHTML = iconLoad; f.classList.remove('playing'); }
    }
    else if(state === true){ 
        // CÂNTĂ (Stare activă - Portocaliu)
        if(b) { b.innerHTML = iconPause; b.classList.add('playing'); }
        if(f) { f.innerHTML = iconPause; f.classList.add('playing'); }
    }
    else { 
        // PAUZĂ (Stare inactivă - Alb)
        if(b) { b.innerHTML = iconPlay; b.classList.remove('playing'); }
        if(f) { f.innerHTML = iconPlay; f.classList.remove('playing'); }
    }
    
    lucide.createIcons();
}



function scanAllStations() { stations.forEach(s => { if (!s.stream.includes('.m3u8')) fetchSilentMetadata(s); }); }

async function fetchSilentMetadata(station) {
    try {
        const response = await fetch(station.stream, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = parseInt(response.headers.get("icy-metaint"));
        if (!metaInt) return;
        let buffer = new Uint8Array();
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            let temp = new Uint8Array(buffer.length + value.length); temp.set(buffer); temp.set(value, buffer.length); buffer = temp;
            while (buffer.length >= metaInt + 1) {
                let metaLength = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + metaLength) break;
                let metaString = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + metaLength));
                let match = metaString.match(/StreamTitle='([^']*)'/);
                if (match && match[1]) {
                    station.desc = match[1].replace(/;/g, "").trim();
                    updateUIMetadata(station);
                    reader.cancel(); return;
                }
                buffer = buffer.slice(metaInt + 1 + metaLength);
            }
        }
    } catch(e) {}
}

function updateArtUI(newImg) {
    const art1 = document.getElementById('player-img-1'); const art2 = document.getElementById('player-img-2');
    const bg1 = document.getElementById('bg-layer-1'); const bg2 = document.getElementById('bg-layer-2');
    const nextArt = activeArtLayer === 1 ? art2 : art1; const currentArt = activeArtLayer === 1 ? art1 : art2;
    const nextBG = activeBGLayer === 1 ? bg2 : bg1; const currentBG = activeBGLayer === 1 ? bg1 : bg2;
    
    nextArt.src = newImg; nextBG.style.backgroundImage = `url(${newImg})`;
    nextArt.classList.replace('art-hidden', 'art-visible'); currentArt.classList.replace('art-visible', 'art-hidden');
    nextBG.style.opacity = '1'; currentBG.style.opacity = '0';
    activeArtLayer = activeArtLayer === 1 ? 2 : 1; activeBGLayer = activeBGLayer === 1 ? 2 : 1;
    updateMediaSession(currentFilteredList[currentIdx]);
}

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3) return;
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const newImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            stationRef.img = newImg;
            if (currentFilteredList[currentIdx] === stationRef) updateArtUI(newImg);
            const listItems = document.querySelectorAll('.station-item');
            listItems.forEach(item => {
                if(item.getAttribute('data-name') === stationRef.name) {
                    const thumb = item.querySelector('.station-thumb');
                    const desc = item.querySelector('.station-desc');
                    thumb.style.opacity = '0';
                    setTimeout(() => {
                        thumb.src = newImg;
                        thumb.style.opacity = '1';
                        if(desc) desc.innerText = stationRef.desc;
                    }, 400);
                }
            });
        }
    } catch (e) {}
}

function updateUIMetadata(station) {
    fetchAlbumArt(station.desc, station);
    if (currentFilteredList[currentIdx] === station) {
        const slide = document.getElementById('slide-current');
        if(slide) slide.querySelector('p').innerText = station.desc;
        updateMediaSession(station);
    }
}

async function fetchMetadata(streamUrl, stationRef) {
    const requestId = ++currentMetadataRequestId;
    try {
        const response = await fetch(streamUrl, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = parseInt(response.headers.get("icy-metaint"));
        if (!metaInt) return;
        let buffer = new Uint8Array();
        while (true) {
            const { done, value } = await reader.read();
            if (done || requestId !== currentMetadataRequestId) break;
            let temp = new Uint8Array(buffer.length + value.length); temp.set(buffer); temp.set(value, buffer.length); buffer = temp;
            while (buffer.length >= metaInt + 1) {
                let metaLength = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + metaLength) break;
                let metaString = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + metaLength));
                let match = metaString.match(/StreamTitle='([^']*)'/);
                if (match && match[1]) {
                    let nt = match[1].replace(/;/g, "").trim();
                    if (stationRef.currentTrack !== nt) { stationRef.desc = nt; stationRef.currentTrack = nt; updateUIMetadata(stationRef); }
                }
                buffer = buffer.slice(metaInt + 1 + metaLength);
            }
        }
    } catch (err) {}
}

function updateSliderText() {
    if (currentFilteredList.length === 0) return;
    const pIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    const nIdx = (currentIdx + 1) % currentFilteredList.length;
    updateSlide('slide-prev', currentFilteredList[pIdx]);
    updateSlide('slide-current', currentFilteredList[currentIdx]);
    updateSlide('slide-next', currentFilteredList[nIdx]);
}

function updateSlide(id, data) { 
    const el = document.getElementById(id); 
    if(!el) return;
    el.querySelector('h2').innerText = data.name; 
    el.querySelector('p').innerText = data.desc; 
}

function loadStationInfo(idx, sp = true) {
    if (currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];
    updateArtUI(s.img || FALLBACK_IMG);
    
    if (metadataInterval) clearInterval(metadataInterval);
    currentMetadataRequestId++; 
    
    audio.src = s.stream;

    // MODIFICĂ AICI: de la 1000 la 3000
    setTimeout(() => { 
        fetchMetadata(s.stream, s); 
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000); 
    }, 3000); // <--- Aici sunt cele 3 secunde

    if(sp) { updateUI('loading'); audio.play().catch(()=>{}); }
    updateMediaSession(s);
}


function playStation() { updateSliderText(); loadStationInfo(currentIdx, true); switchTab('player'); }
function next() { currentIdx = (currentIdx + 1) % currentFilteredList.length; animateTransition('next'); }
function prev() { currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; animateTransition('prev'); }

function animateTransition(dir) {
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir==='next' ? 'translateX(-66.666%)' : 'translateX(0)';
    setTimeout(()=>{ wrapper.style.transition='none'; loadStationInfo(currentIdx, true); updateSliderText(); wrapper.style.transform = 'translateX(-33.333%)'; }, 600);
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; isDragging=true; wrapper.style.transition='none'; }, {passive: true});
        z.addEventListener('touchmove', e=>{ if(!isDragging) return; const d = e.touches[0].clientX-startX; wrapper.style.transform = `translateX(calc(-33.333% + ${(d/window.innerWidth)*33}%))`; }, {passive: true});
        z.addEventListener('touchend', e=>{ 
            if(!isDragging) return; const d = e.changedTouches[0].clientX - startX;
            if(d>60) prev(); else if(d<-60) next(); else { wrapper.style.transition = 'transform 0.4s ease'; wrapper.style.transform='translateX(-33.333%)'; }
            isDragging=false;
        });
    });
}

function togglePlay() { 
    if (audio.paused) {
        // Punem butonul în starea de încărcare imediat
        updateUI('loading'); 
        
        audio.play().catch((error) => {
            console.error("Eroare la redare:", error);
            updateUI(false); // Revenim la iconița de Play dacă eșuează (ex: block de browser)
        }); 
    } else {
        audio.pause(); 
        // updateUI(false) va fi chemat automat de event listener-ul 'pause' din init()
    }
}


init();
</script>
