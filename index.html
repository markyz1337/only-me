<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}




/* Stiluri pentru Egalizatorul din Listă */
.playing-icon {
    display: none;
    align-items: flex-end;
    gap: 2px;
    width: 20px;
    height: 20px;
    margin-left: 10px;
}

.station-item.is-playing .playing-icon {
    display: flex; /* Se afișează doar când părintele are clasa .is-playing */
}

/* Egalizatorul optimizat */
.playing-icon span {
    display: inline-block;
    width: 3px;
    background: linear-gradient(to top, var(--accent), #ff9d85); 
    border-radius: 2px;
    animation: bounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 3px var(--accent), 0 0 5px rgba(255, 94, 58, 0.4);
}

/* Titlul postului care rulează cu efect de Neon discret */
.station-item.is-playing .station-name {
    color: var(--accent);
    /* Aplicăm același tip de glow subtil ca la egalizator */
    text-shadow: 0 0 25px var(--accent), 0 0 6px rgba(255, 94, 58, 0.2);
    transition: all 0.4s ease;
}




.playing-icon span:nth-child(2) { animation-duration: 0.7s; }
.playing-icon span:nth-child(3) { animation-duration: 0.6s; }

@keyframes bounce {
    from { height: 5px; }
    to { height: 18px; }
}

/* Stil pentru a evidenția rândul activ (opțional) */
.station-item.is-playing .station-name {
    color: var(--accent);
}


::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; /* Previne scroll-ul pe body */
    display: flex; 
    justify-content: center;
    touch-action: pan-y; /* Permite doar gesturi verticale, util pentru acuratețe */
}


/* Containerul butonului - poziționat peste copertă */
.player-yt-link {
    position: absolute;
    right: 11px;
    bottom: 11px;
    z-index: 35;
    display: flex;
    background: rgba(0, 0, 0, 0.7); /* Fundal semitransparent ca să se vadă pe orice poză */
    backdrop-filter: blur(5px);
    border-radius: 18px;
    padding: 4px;
    transition: transform 0.3s ease, opacity 0.5s ease, visibility 0.5s ease;
    opacity: 0.8;
    visibility: visible;
    text-decoration: none;
}

/* LIMITAREA ICONIȚEI - Aceasta este partea care rezolvă problema "gigantului" */
.player-yt-link img {
    width: 36px;  /* Dimensiune mică, controlată */
    height: 36px;
    display: block;
    object-fit: contain;
}

/* Efect de apăsare */
.player-yt-link:active {
    transform: scale(0.9);
}

/* Stilul pentru când butonul trebuie să fie ascuns */
.yt-hidden {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none;
    transform: scale(0.7);
}




.app-container {
    width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* Modifică/Înlocuiește aceste părți în <style> */
.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; 
    background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; 
    opacity: 0; /* Toate pornesc de la 0 */
    transition: opacity 1.5s ease-in-out; /* Tranziție lungă */
    will-change: opacity;
}

@keyframes bgBreathe {
    0%, 100!% { transform: scale(1.0) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }


.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px 140px 20px; 
    
    /* Activează scroll-ul pe verticală */
    overflow-y: auto; 
    
    /* === ADAUGĂ ACESTE LINII PENTRU EFECTUL ELASTIC === */
    /* Permite "overscroll" (trecerea peste limită) cu efect de bounce */
    overscroll-behavior-y: contain; 
    
    /* Asigură fluiditatea scroll-ului pe iOS */
    -webkit-overflow-scrolling: touch; 
}

.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

.owned-yt-btn {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    margin-left: 10px;
    cursor: pointer;
    transition: transform 0.2s ease;
}
.owned-yt-btn:active { transform: scale(0.85); }
.owned-yt-btn img {
    width: 30px; height: 30px;
    object-fit: contain; opacity: 0.80; 
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { 
        box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); 
        transform: scale(1.05); 
    }
    50% { 
        box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); 
        transform: scale(1.10); /* O ușoară mărire suplimentară la mijlocul pulsului */
    }
}


.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
}
.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; 
    color: #000;      
    width: 56px; 
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.fab.playing {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}



</style>

function init() {
    // 1. Citim query-ul trimis de 404.html (ex: ?man sau ?hope)
    const urlQuery = window.location.search.substring(1);
    let autoStartStation = null;

    if (urlQuery) {
        // Decodăm textul (ex: %20 devine spațiu) și îl facem litere mici
        const targetName = decodeURIComponent(urlQuery).toLowerCase().trim();
        
        // Căutare inteligentă: Găsește prima stație care CONȚINE textul scris în URL
        autoStartStation = stations.find(s => 
            s.name.toLowerCase().includes(targetName)
        );

        if (autoStartStation) {
            // Curățăm URL-ul în bara de adrese: 
            // - Scoatem "/" de la final dacă există
            // - Adăugăm numele complet al stației găsit
            // - replace(/\s+/g, '') scoate spațiile pentru un link tip: /m2/heart10s
            const cleanName = autoStartStation.name.toLowerCase().replace(/\s+/g, '');
            const cleanPath = window.location.pathname.replace(/\/$/, "") + "/" + cleanName;
            
            window.history.replaceState({}, "", cleanPath);
        }
    }

    // 2. Logică de pornire condiționată
    if (autoStartStation) {
        // Dacă am găsit ceva prin URL, forțăm tab-ul 'all' ca să existe în listă
        renderList('all', document.getElementById('tab-all'));
        
        // Găsim indexul stației în lista filtrată curentă
        currentIdx = currentFilteredList.indexOf(autoStartStation);
        
        // Încărcăm stația și activăm Playerul
        // sp=true (pornește muzica), skipArt=false (arată coperta)
        loadStationInfo(currentIdx, true, false); 
        switchTab('player');
    } else {

let fabStartX = 0;
let fabStartY = 0;
let fabIsDragging = false;


function setupFabSwipe() {
    const fab = document.getElementById('fab-play-pause');
    
    fab.addEventListener('touchstart', (e) => {
        fabStartX = e.touches[0].clientX;
        fabStartY = e.touches[0].clientY;
        fabIsDragging = true;
    }, { passive: true });

    fab.addEventListener('touchend', (e) => {
        if (!fabIsDragging) return;
        
        const diffX = e.changedTouches[0].clientX - fabStartX;
        const diffY = e.changedTouches[0].clientY - fabStartY;
        const threshold = 30;

        if (currentFilteredList.length === 0) return;

        // 🔽 JOS → NEXT
        if (diffY > threshold && Math.abs(diffY) > Math.abs(diffX)) {
            if (audio.paused && !audio.src) {
                playStation(); 
            } else {
                next();
            }
            showFabFeedback('skip-forward');
        }

        // 🔼 SUS → PREVIOUS
        else if (diffY < -threshold && Math.abs(diffY) > Math.abs(diffX)) {
            if (audio.paused && !audio.src) {
                playStation();
            } else {
                prev();
            }
            showFabFeedback('skip-back');
        }

        // ⬅️ STÂNGA → NEXT
        else if (diffX < -threshold) {
            if (audio.paused && !audio.src) {
                playStation();
            } else {
                next();
            }
            showFabFeedback('skip-forward');
        }
        
        fabIsDragging = false;
    });
}

}

// 1. Modificăm fetchSilentMetadata să asigure afișarea fundalului
async function fetchSilentMetadata(station) {
    try {
        const response = await fetch(station.stream, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = parseInt(response.headers.get("icy-metaint"));
        
        // Dacă nu avem metadate, punem măcar logo-ul pe fundal la început
        if (!metaInt && station.isInitialBgSource) {
            applyImageToUI(station.originalImg, station, true);
            return;
        }

        let buffer = new Uint8Array();
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            let temp = new Uint8Array(buffer.length + value.length); 
            temp.set(buffer); temp.set(value, buffer.length); buffer = temp;

            while (buffer.length >= metaInt + 1) {
                let metaLength = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + metaLength) break;
                let metaString = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + metaLength));
                let match = metaString.match(/StreamTitle='([^']*)'/);
                
                if (match && match[1]) {
                    station.desc = match[1].replace(/;/g, "").trim();
                    // Căutăm coperta pe iTunes
                    fetchAlbumArt(station.desc, station);
                    reader.cancel(); 
                    return;
                }
                buffer = buffer.slice(metaInt + 1 + metaLength);
            }
        }
    } catch(e) {
        // Dacă stream-ul e picat sau eroarea de rețea, punem logo-ul
        if (station.isInitialBgSource) applyImageToUI(station.originalImg, station, true);
    }
}

// În interiorul funcției loadStationInfo(idx, sp = true)

function loadStationInfo(idx, sp = true, skipArt = false) {
    if (currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];
    
    // Dezactivăm starea de fundal inițială
    if (sp) {
        stations.forEach(st => st.isInitialBgSource = false);
    }

    activeStationObject = s;

    // Actualizăm interfața (Copertă și Buton YouTube)
    if (sp || !skipArt) {
        updateArtUI(s.img || FALLBACK_IMG);
    }

    const ytBtn = document.getElementById('player-yt-btn');
    if (s.yt) { 
        ytBtn.href = s.yt; 
        ytBtn.classList.remove('yt-hidden'); 
    } else { 
        ytBtn.classList.add('yt-hidden'); 
    }

    // Gestionare Metadate
    if (metadataInterval) clearInterval(metadataInterval);
    currentMetadataRequestId++; 
    
    audio.src = s.stream;

    setTimeout(() => { 
        fetchMetadata(s.stream, s); 
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000); 
    }, 3000);

    // Încercare redare cu gestionare eroare Autoplay
    if(sp) { 
        updateUI('loading'); 
        audio.play().catch(error => {
            console.warn("Autoplay a fost blocat. Utilizatorul trebuie să apese Play manual.");
            updateUI(false); // Oprește rotirea și arată butonul de Play
        }); 
    }
    
    updateMediaSession(s);
}

function animateTransition(dir) {
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir==='next' ? 'translateX(-66.666%)' : 'translateX(0)';
    setTimeout(()=>{ wrapper.style.transition='none'; loadStationInfo(currentIdx, true); updateSliderText(); wrapper.style.transform = 'translateX(-33.333%)'; }, 600);
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; isDragging=true; wrapper.style.transition='none'; }, {passive: true});
        z.addEventListener('touchmove', e=>{ if(!isDragging) return; const d = e.touches[0].clientX-startX; wrapper.style.transform = `translateX(calc(-33.333% + ${(d/window.innerWidth)*33}%))`; }, {passive: true});
        z.addEventListener('touchend', e=>{ 
            if(!isDragging) return; const d = e.changedTouches[0].clientX - startX;
            if(d>60) prev(); else if(d<-60) next(); else { wrapper.style.transition = 'transform 0.4s ease'; wrapper.style.transform='translateX(-33.333%)'; }
            isDragging=false;
        });
    });
}

        loadStationInfo(currentIdx, true, false); 
    } else {
        audio.pause(); 
    }
}




init();
</script>
