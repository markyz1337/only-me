<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

.typing-container {
    display: inline; /* Schimbat din inline-flex în inline */
    position: relative;
    word-break: break-word; /* Previne ruperea urâtă a cuvintelor */
}

.visible-text {
    display: inline;
    white-space: pre-wrap; /* Păstrează spațiile corect */
}

.cursor-custom {
    display: inline-block;
    width: 2px;
    height: 1.2em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    /* Am crescut de la 0.8s la 1.2s pentru un ritm mai relaxat */
    /* Am scos 'step-end' pentru a avea o tranziție mai fină (fade in/out) */
    animation: blink 2.2s ease-in-out infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; } /* Nu dispare de tot, rămâne o urmă discretă */
}






.fade-text {
    transition: opacity 0.5s ease-in-out;
}



/* Doar emoji-ul va face fade, textul "Hope" rămâne fix */
#slide-current h2 span {
    transition: opacity 0.6s ease-in-out;
    display: inline-block;
    will-change: opacity;
}

.fade-out-emoji {
    opacity: 0 !important;
}

/* Stiluri pentru inimi care ies organic de sub copertă */
.heart-particle {
    position: fixed;
    pointer-events: none;
    z-index: 5; 
    user-select: none;
    line-height: 1;
    will-change: transform, opacity;
    animation: floatHeartOut 16s ease-out forwards;
}

@keyframes floatHeartOut {
    0% {
        transform: translate(0, 30px) scale(0) rotate(0deg);
        opacity: 0;
    }
    15% {
        opacity: var(--target-opacity);
        transform: translate(var(--move-x), var(--move-y-start)) scale(1.1);
    }
    100% {
        transform: translate(calc(var(--move-x) * 2.5), -220px) scale(0.4) rotate(var(--random-rot));
        opacity: 0;
    }
}

/* Stiluri pentru Egalizatorul din Listă */
.playing-icon {
    display: none;
    align-items: flex-end;
    gap: 2px;
    width: 20px;
    height: 20px;
    margin-left: 10px;
}

.station-item.is-playing .playing-icon {
    display: flex;
}

.playing-icon span {
    display: inline-block;
    width: 3px;
    background: linear-gradient(to top, var(--accent), #ff9d85); 
    border-radius: 2px;
    animation: bounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 3px var(--accent), 0 0 5px rgba(255, 94, 58, 0.4);
}

.station-item.is-playing .station-name {
    color: var(--accent);
    text-shadow: 0 0 25px var(--accent), 0 0 6px rgba(255, 94, 58, 0.2);
    transition: all 0.4s ease;
}

.playing-icon span:nth-child(2) { animation-duration: 0.7s; }
.playing-icon span:nth-child(3) { animation-duration: 0.6s; }

@keyframes bounce {
    from { height: 5px; }
    to { height: 18px; }
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    display: flex; 
    justify-content: center;
    touch-action: pan-y;
}

.player-yt-link {
    position: absolute;
    right: 11px;
    bottom: 11px;
    z-index: 35;
    display: flex;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(5px);
    border-radius: 16px;
    padding: 4px;
    transition: transform 0.3s ease, opacity 0.5s ease, visibility 0.5s ease;
    opacity: 0.8;
    visibility: visible;
    text-decoration: none;
}

.player-yt-link img {
    width: 29px;
    height: 29px;
    display: block;
    object-fit: contain;
}

.player-yt-link:active {
    transform: scale(0.9);
}

.yt-hidden {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none;
    transform: scale(0.7);
}

.app-container {
    width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; 
    background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; 
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }

.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px 140px 20px; 
    overflow-y: auto; 
    overscroll-behavior-y: contain; 
    -webkit-overflow-scrolling: touch; 
}

.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); transform: scale(1.05); }
    50% { box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); transform: scale(1.10); }
}

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
}
.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; 
    color: #000;      
    width: 56px; 
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.fab.playing {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}
</style>

            <div class="track-slider-wrapper" id="info-wrapper">

                <div class="track-info-slide" id="slide-current"><h2>Alege un post</h2><p>Radio Player</p></div>
                <div class="track-info-slide" id="slide-next"><h2>Post Următor</h2><p>Gen</p></div>

        <div class="main-controls">

    </div>

</div>

let hopeTextIdx = 0;
let typingTimeout = null;

function startHopeKaraoke() {
    const descEl = document.querySelector('#slide-current p');
    if (!descEl || !activeStationObject || activeStationObject.name !== "Hope") return;

    descEl.classList.add('typing-text');
    
    typeWriter(hopeTexts[hopeTextIdx], descEl, () => {
        // Verificăm dacă mai sunt texte de afișat
        if (hopeTextIdx < hopeTexts.length - 1) {
            let delay = hopeTextIdx === 0 ? 4000 : 2500;
            typingTimeout = setTimeout(() => {
                hopeTextIdx++; // Mergem la următorul text
                startHopeKaraoke();
            }, delay);
        } else {
            // S-a ajuns la ultimul text (indexul final). 
            // Nu mai apelăm startHopeKaraoke, deci se oprește aici.
            console.log("Karaoke finalizat.");
        }
    });
}


function typeWriter(text, element, callback) {
    if (typingTimeout) cancelAnimationFrame(typingTimeout);
    
    // Injectăm structura inițială: text gol + cursor
    element.innerHTML = `<span class="typing-container"><span class="visible-text"></span><span class="cursor-custom"></span></span>`;
    const textSpan = element.querySelector('.visible-text');
    
    const duration = text.length * 70; 
    const startTime = performance.now();

    function animate(currentTime) {
        if (!activeStationObject || activeStationObject.name !== "Hope" || audio.paused) return;

        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        const currentLength = Math.floor(progress * text.length);
        const currentText = text.substring(0, currentLength);
        
        // Update doar la text, cursorul rămâne în container și clipește prin CSS
        textSpan.textContent = currentText;

        if (progress < 1) {
            typingTimeout = requestAnimationFrame(animate);
        } else {
            // Când termină de scris, așteaptă și apoi execută callback-ul pentru următorul text
            if (callback) {
                typingTimeout = setTimeout(callback, 2500);
            }
        }
    }

    typingTimeout = requestAnimationFrame(animate);
}










// --- LOGICA HOPE EMOJI & EFECTE ---
const hopeEmojis = ["🌅", "🫵🏼🫶🏼", "💛", "🥰", "❤️‍🔥", "💗", "🏳️", "💞", "✨", "⭐️", "🌙", "🌕", "🌼", "🌸", "🥹"];
let hopeInterval = null; 
let emojiInterval = null; 

function rotateHopeEmoji() {
    const isHope = activeStationObject && activeStationObject.name === "Hope";
    const titleEl = document.querySelector('#slide-current h2');
    if (isHope && titleEl) {
        const emojiSpan = titleEl.querySelector('span');
        if (!emojiSpan) return;
        emojiSpan.style.opacity = "0";
        setTimeout(() => {
            emojiSpan.innerText = hopeEmojis[Math.floor(Math.random() * hopeEmojis.length)];
            emojiSpan.style.opacity = "1";
        }, 650);
    }
}

function checkHopeEffect() {
    const isHope = activeStationObject && activeStationObject.name === "Hope";
    const isPlaying = !audio.paused;
    
    if (isHope && isPlaying) {
        if (!hopeInterval) hopeInterval = setInterval(createHeart, 1100);
        if (!typingTimeout) {
            hopeTextIdx = 0;
            startHopeKaraoke();
        }
        if (!emojiInterval) {
            const titleEl = document.querySelector('#slide-current h2');
            if (titleEl && !titleEl.querySelector('span')) {
                titleEl.innerHTML = `Hope <span style="transition: opacity 0.6s ease-in-out; display: inline-block;">${hopeEmojis[0]}</span>`;
            }
            emojiInterval = setInterval(rotateHopeEmoji, 5000);
        }
    } else {
        stopHopeEffect();
    }
}

function stopHopeEffect() {
    if (hopeInterval) { clearInterval(hopeInterval); hopeInterval = null; }
    if (emojiInterval) { clearInterval(emojiInterval); emojiInterval = null; }
    if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
    
    const descEl = document.querySelector('#slide-current p');
    if (descEl) {
        descEl.classList.remove('typing-text');
        if (activeStationObject) descEl.innerText = activeStationObject.desc;
    }
}

function createHeart() {
    const playerView = document.getElementById('player-view');
    const artContainer = document.querySelector('.art-container');
    if (window.getComputedStyle(playerView).display === 'none' || !artContainer) return;
    const heart = document.createElement('div');
    heart.className = 'heart-particle';
    heart.innerHTML = '💛';
    const rect = artContainer.getBoundingClientRect();
    const sX = rect.left + (Math.random() * rect.width);
    const sY = rect.top + (Math.random() * rect.height);
    const mX = (Math.random() - 0.5) * 150;
    const mY = (Math.random() - 0.5) * 50;
    heart.style.left = `${sX}px`;
    heart.style.top = `${sY}px`;
    heart.style.fontSize = `${Math.random() * 10 + 15}px`;
    heart.style.setProperty('--move-x', `${mX}px`);
    heart.style.setProperty('--move-y-start', `${mY}px`);
    heart.style.setProperty('--random-rot', (Math.random() * 180 - 90) + "deg");
    heart.style.setProperty('--target-opacity', (Math.random() * 0.4 + 0.3).toFixed(2));
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

// --- LOGICA IMAGINI ȘI METADATA ---
function applyImageToUI(imgUrl, stationRef, isFallback) {
    const tempImg = new Image();
    tempImg.src = imgUrl;
    tempImg.onload = () => {
        stationRef.img = imgUrl;
        if (stationRef.isInitialBgSource && audio.paused) {
            const bg1 = document.getElementById('bg-layer-1');
            bg1.style.backgroundImage = `url(${imgUrl})`;
            bg1.style.opacity = "1";
        }
        if (activeStationObject && activeStationObject.name === stationRef.name) updateArtUI(imgUrl);
        document.querySelectorAll('.station-item').forEach(item => {
            if(item.getAttribute('data-name') === stationRef.name) {
                const thumb = item.querySelector('.station-thumb');
                if(thumb) thumb.src = imgUrl;
            }
        });
    };
}

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3) {
        if (stationRef.isInitialBgSource) applyImageToUI(stationRef.originalImg, stationRef, true);
        return;
    }
    let itunesFinished = false;
    if (stationRef.isInitialBgSource) {
        setTimeout(() => { if (!itunesFinished) applyImageToUI(stationRef.originalImg, stationRef, true); }, 2000);
    }
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        itunesFinished = true;
        if (data.results && data.results.length > 0) {
            const newImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            applyImageToUI(newImg, stationRef, false);
        } else {
            applyImageToUI(stationRef.originalImg, stationRef, true);
        }
    } catch (e) { applyImageToUI(stationRef.originalImg, stationRef, true); }
}

async function fetchMetadata(url, station) {
    if (url.includes('.m3u8')) return;
    try {
        const response = await fetch(url, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        const metaInt = parseInt(response.headers.get("icy-metaint"));
        if (!metaInt) { if(station.isInitialBgSource) applyImageToUI(station.originalImg, station, true); return; }
        let buffer = new Uint8Array();
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            let temp = new Uint8Array(buffer.length + value.length);
            temp.set(buffer); temp.set(value, buffer.length); buffer = temp;
            while (buffer.length >= metaInt + 1) {
                let mLen = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + mLen) break;
                let mStr = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + mLen));
                let match = mStr.match(/StreamTitle='([^']*)'/);
                if (match && match[1]) {
                    station.desc = match[1].replace(/;/g, "").trim();
                    fetchAlbumArt(station.desc, station);
                    // Update text only if NOT Hope or if Hope is paused
                    if (activeStationObject && activeStationObject.name === station.name) {
                         if (activeStationObject.name !== "Hope" || audio.paused) {
                            const slide = document.getElementById('slide-current');
                            if(slide) slide.querySelector('p').innerText = station.desc;
                         }
                    }
                    reader.cancel(); return;
                }
                buffer = buffer.slice(metaInt + 1 + mLen);
            }
        }
    } catch(e) { if(station.isInitialBgSource) applyImageToUI(station.originalImg, station, true); }
}

function updateArtUI(newImg) {
    const art1 = document.getElementById('player-img-1'); const art2 = document.getElementById('player-img-2');
    const bg1 = document.getElementById('bg-layer-1'); const bg2 = document.getElementById('bg-layer-2');
    const nA = activeArtLayer === 1 ? art2 : art1; const cA = activeArtLayer === 1 ? art1 : art2;
    const nB = activeBGLayer === 1 ? bg2 : bg1; const cB = activeBGLayer === 1 ? bg1 : bg2;
    nA.src = newImg; nB.style.backgroundImage = `url(${newImg})`;
    nA.classList.replace('art-hidden', 'art-visible'); cA.classList.replace('art-visible', 'art-hidden');
    nB.style.opacity = '1'; cB.style.opacity = '0';
    activeArtLayer = activeArtLayer === 1 ? 2 : 1; activeBGLayer = activeBGLayer === 1 ? 2 : 1;
    updateMediaSession();
}

// --- CORE PLAYER ---
function loadStationInfo(idx, sp = true, skipArt = false) {
    if (currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];
    
    if (sp) stations.forEach(st => st.isInitialBgSource = false);
    activeStationObject = s;

    if (ENABLE_DIRECT_LINKS && sp) {
        const cleanName = transliterate(s.name).toLowerCase().replace(/\s+/g, '');
        window.history.replaceState({}, "", "/" + cleanName);
    }

    if (sp || !skipArt) updateArtUI(s.img || FALLBACK_IMG);
    
    const ytBtn = document.getElementById('player-yt-btn');
    if (s.yt) { 
        ytBtn.href = s.yt; 
        ytBtn.classList.remove('yt-hidden'); 
    } else { 
        ytBtn.classList.add('yt-hidden'); 
    }

    if (metadataInterval) clearInterval(metadataInterval);
    audio.src = s.stream;

    setTimeout(() => { 
        fetchMetadata(s.stream, s); 
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000); 
    }, 3000);

    if(sp) { 
        updateUI('loading'); 
        audio.play().catch(() => updateUI(false)); 
    }
    updateMediaSession();
}

function togglePlay() { 
    if (audio.paused) loadStationInfo(currentIdx, true, false); 
    else audio.pause(); 
}

function updateUI(state) { 
    const b = document.getElementById('play-trigger');
    const f = document.getElementById('fab-play-pause');
    if(!b && !f) return;
    const icons = { play: 'play', pause: 'pause', loading: 'loader-2' };
    let currentIcon = state === 'loading' ? icons.loading : (state === true ? icons.pause : icons.play);
    [b, f].forEach(el => {
        if(!el) return;
        el.innerHTML = `<i data-lucide="${currentIcon}" ${currentIcon === 'loader-2' ? 'class="spin"' : 'fill="currentColor"'} ></i>`;
        state === true ? el.classList.add('playing') : el.classList.remove('playing');
    });
    document.querySelectorAll('.station-item').forEach(item => {
        item.classList.toggle('is-playing', (state === true || state === 'loading') && activeStationObject && item.getAttribute('data-name') === activeStationObject.name);
    });
    checkHopeEffect();
    lucide.createIcons();
}

function updateMediaSession() {
    if ('mediaSession' in navigator && activeStationObject) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: activeStationObject.desc,
            artist: activeStationObject.name,
            album: "Sergiu FM",
            artwork: [{ src: activeStationObject.img || FALLBACK_IMG, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
    }
}

function switchTab(t) {
    const isPlayer = t === 'player';
    document.getElementById('list-view').style.display = isPlayer ? 'none' : 'flex';
    document.getElementById('player-view').style.display = isPlayer ? 'flex' : 'none';
    document.getElementById('nav-list').classList.toggle('active', !isPlayer);
    document.getElementById('nav-player').classList.toggle('active', isPlayer);
    document.getElementById('main-nav').className = isPlayer ? 'nav-bar on-player' : 'nav-bar on-radio';
    document.getElementById('fab-play-pause').style.display = isPlayer ? 'none' : 'flex';
    checkHopeEffect();
}

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    const scrollContainer = document.querySelector('.content');
    if (scrollContainer) scrollContainer.scrollTop = 0;
    list.innerHTML = "";
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    currentFilteredList = stations.filter(s => s[`is${mode.charAt(0).toUpperCase() + mode.slice(1)}`] || (mode === 'all' && s.isAll));
    currentFilteredList.forEach((s) => {
        const item = document.createElement('div');
        item.className = 'station-item';
        item.setAttribute('data-name', s.name); 
        item.innerHTML = `<img src="${s.img || FALLBACK_IMG}" class="station-thumb"><div style="flex:1"><div class="station-name">${s.name}</div><div class="station-desc">${s.desc}</div></div><div class="playing-icon"><span></span><span></span><span></span></div>`;
        item.onclick = () => { currentIdx = currentFilteredList.indexOf(s); playStation(); };
        list.appendChild(item);
    });
    updateUI(!audio.paused);
}

function playStation() { updateSliderText(); loadStationInfo(currentIdx, true); switchTab('player'); }
function next() { currentIdx = (currentIdx + 1) % currentFilteredList.length; animateTransition('next'); }
function prev() { currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; animateTransition('prev'); }

function animateTransition(dir) {
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir==='next' ? 'translateX(-66.666%)' : 'translateX(0)';
    setTimeout(()=>{ 
        wrapper.style.transition='none'; 
        loadStationInfo(currentIdx, true); 
        updateSliderText(); 
        wrapper.style.transform = 'translateX(-33.333%)'; 
    }, 600);
}

function updateSliderText() {
    if (currentFilteredList.length === 0) return;
    const ids = ['slide-prev', 'slide-current', 'slide-next'];
    const indices = [(currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length, currentIdx, (currentIdx + 1) % currentFilteredList.length];
    ids.forEach((id, i) => {
        const el = document.getElementById(id);
        const data = currentFilteredList[indices[i]];
        const h2 = el.querySelector('h2');
        if (data.name === "Hope" && id === "slide-current") h2.innerHTML = `Hope <span> ${hopeEmojis[0]}</span>`;
        else h2.innerText = data.name;
        el.querySelector('p').innerText = data.desc;
    });
}

function transliterate(t) {
    if (!t) return "";
    let r = t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const map = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
    r = r.split('').map(c => map[c] || c).join('');
    return r.replace(/[^a-z0-9]/g, '');
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; isDragging=true; wrapper.style.transition='none'; }, {passive: true});
        z.addEventListener('touchmove', e=>{ if(!isDragging) return; const d = e.touches[0].clientX-startX; wrapper.style.transform = `translateX(calc(-33.333% + ${(d/window.innerWidth)*33}%))`; }, {passive: true});
        z.addEventListener('touchend', e=>{ 
            if(!isDragging) return; const d = e.changedTouches[0].clientX - startX;
            if(d>60) prev(); else if(d<-60) next(); else { wrapper.style.transition = 'transform 0.4s ease'; wrapper.style.transform='translateX(-33.333%)'; }
            isDragging=false;
        });
    });
}

function setupFabSwipe() {
    const fab = document.getElementById('fab-play-pause');
    let fSX, fSY;
    fab.addEventListener('touchstart', e => { fSX = e.touches[0].clientX; fSY = e.touches[0].clientY; }, {passive: true});
    fab.addEventListener('touchend', e => {
        const dX = e.changedTouches[0].clientX - fSX;
        const dY = e.changedTouches[0].clientY - fSY;
        if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
            if (dY > 30 || dX < -30) next(); else if (dY < -30) prev();
            const icon = (dY > 30 || dX < -30) ? 'skip-forward' : 'skip-back';
            const iconEl = fab.querySelector('i');
            iconEl.setAttribute('data-lucide', icon); lucide.createIcons();
            setTimeout(() => { iconEl.setAttribute('data-lucide', audio.paused ? 'play' : 'pause'); lucide.createIcons(); }, 800);
            if (navigator.vibrate) navigator.vibrate(30);
        }
    });
}

function init() {
    let auto = null;
    if (ENABLE_DIRECT_LINKS) {
        const path = window.location.pathname.split('/').filter(s => s.length > 0).pop();
        const query = window.location.search.substring(1);
        const raw = path || query;
        if (raw) {
            const search = transliterate(decodeURIComponent(raw));
            auto = stations.find(s => transliterate(s.name).includes(search));
        }
    }
    if (auto) {
        renderList('all', document.getElementById('tab-all'));
        currentIdx = currentFilteredList.indexOf(auto);
        updateSliderText(); 
        loadStationInfo(currentIdx, true, false); 
        switchTab('player');
    } else {
        const h10 = stations.find(s => s.name === "Heart 10s");
        if (h10) { h10.isInitialBgSource = true; fetchMetadata(h10.stream, h10); }
        renderList('mine', document.getElementById('tab-mine'));
        loadStationInfo(0, false, true);
        updateSliderText();
        if (ENABLE_DIRECT_LINKS && window.location.pathname !== "/") {
            window.history.replaceState({}, "", "/");
        }
    }
    setupSwipe();
    setupFabSwipe();
    stations.forEach(s => fetchMetadata(s.stream, s));
    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
}
init();
</script>
