<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

/* Doar emoji-ul va face fade, textul "Hope" rămâne fix */
#slide-current h2 span {
    transition: opacity 0.6s ease-in-out;
    display: inline-block;
    will-change: opacity;
}

.fade-out-emoji {
    opacity: 0 !important;
}




/* Stiluri pentru inimi care ies organic de sub copertă */
.heart-particle {
    position: fixed; /* Folosim fixed pentru a nu fi influențate de scroll */
    pointer-events: none;
    z-index: 5; 
    user-select: none;
    line-height: 1;
    will-change: transform, opacity;
    animation: floatHeartOut 15s ease-out forwards; /* Durată mai lungă: 6 secunde */
}

@keyframes floatHeartOut {
    0% {
        transform: translate(0, 30px) scale(0) rotate(0deg);
        opacity: 0;
    }
    15% {
        opacity: var(--target-opacity);
        transform: translate(var(--move-x), var(--move-y-start)) scale(1.1);
    }
    100% {
        /* Urcă mult mai sus și se împrăștie pe orizontală */
        transform: translate(calc(var(--move-x) * 2.5), -220px) scale(0.4) rotate(var(--random-rot));
        opacity: 0;
    }
}






/* Stiluri pentru Egalizatorul din Listă */
.playing-icon {
    display: none;
    align-items: flex-end;
    gap: 2px;
    width: 20px;
    height: 20px;
    margin-left: 10px;
}

.station-item.is-playing .playing-icon {
    display: flex; /* Se afișează doar când părintele are clasa .is-playing */
}

/* Egalizatorul optimizat */
.playing-icon span {
    display: inline-block;
    width: 3px;
    background: linear-gradient(to top, var(--accent), #ff9d85); 
    border-radius: 2px;
    animation: bounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 3px var(--accent), 0 0 5px rgba(255, 94, 58, 0.4);
}

/* Titlul postului care rulează cu efect de Neon discret */
.station-item.is-playing .station-name {
    color: var(--accent);
    /* Aplicăm același tip de glow subtil ca la egalizator */
    text-shadow: 0 0 25px var(--accent), 0 0 6px rgba(255, 94, 58, 0.2);
    transition: all 0.4s ease;
}




.playing-icon span:nth-child(2) { animation-duration: 0.7s; }
.playing-icon span:nth-child(3) { animation-duration: 0.6s; }

@keyframes bounce {
    from { height: 5px; }
    to { height: 18px; }
}

/* Stil pentru a evidenția rândul activ (opțional) */
.station-item.is-playing .station-name {
    color: var(--accent);
}


::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; /* Previne scroll-ul pe body */
    display: flex; 
    justify-content: center;
    touch-action: pan-y; /* Permite doar gesturi verticale, util pentru acuratețe */
}


/* Containerul butonului - poziționat peste copertă */
.player-yt-link {
    position: absolute;
    right: 11px;
    bottom: 11px;
    z-index: 35;
    display: flex;
    background: rgba(0, 0, 0, 0.7); /* Fundal semitransparent ca să se vadă pe orice poză */
    backdrop-filter: blur(5px);
    border-radius: 16px;
    padding: 4px;
    transition: transform 0.3s ease, opacity 0.5s ease, visibility 0.5s ease;
    opacity: 0.8;
    visibility: visible;
    text-decoration: none;
}

/* LIMITAREA ICONIȚEI - Aceasta este partea care rezolvă problema "gigantului" */
.player-yt-link img {
    width: 29px;  /* Dimensiune mică, controlată */
    height: 29px;
    display: block;
    object-fit: contain;
}

/* Efect de apăsare */
.player-yt-link:active {
    transform: scale(0.9);
}

/* Stilul pentru când butonul trebuie să fie ascuns */
.yt-hidden {
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none;
    transform: scale(0.7);
}




.app-container {
    width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

/* Modifică/Înlocuiește aceste părți în <style> */
.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; 
    background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; 
    opacity: 0; /* Toate pornesc de la 0 */
    transition: opacity 1.5s ease-in-out; /* Tranziție lungă */
    will-change: opacity;
}

@keyframes bgBreathe {
    0%, 100!% { transform: scale(1.0) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }


.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px 140px 20px; 
    
    /* Activează scroll-ul pe verticală */
    overflow-y: auto; 
    
    /* === ADAUGĂ ACESTE LINII PENTRU EFECTUL ELASTIC === */
    /* Permite "overscroll" (trecerea peste limită) cu efect de bounce */
    overscroll-behavior-y: contain; 
    
    /* Asigură fluiditatea scroll-ului pe iOS */
    -webkit-overflow-scrolling: touch; 
}

.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

.owned-yt-btn {
    width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    margin-left: 10px;
    cursor: pointer;
    transition: transform 0.2s ease;
}
.owned-yt-btn:active { transform: scale(0.85); }
.owned-yt-btn img {
    width: 30px; height: 30px;
    object-fit: contain; opacity: 0.80; 
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 280px; height: 280px; position: relative; margin-bottom: 30px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { 
        box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); 
        transform: scale(1.05); 
    }
    50% { 
        box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); 
        transform: scale(1.10); /* O ușoară mărire suplimentară la mijlocul pulsului */
    }
}


.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
}
.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; 
    color: #000;      
    width: 56px; 
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.fab.playing {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}



</style>

    let autoStartStation = null;
    if (ENABLE_DIRECT_LINKS) {
        const urlPath = window.location.pathname.split('/').filter(s => s.length > 0).pop(); 
        if (urlPath) {
            autoStartStation = stations.find(s => transliterate(s.name).toLowerCase().replace(/\s+/g, '').includes(transliterate(urlPath)));
        }
    }

    if (autoStartStation) {
        renderList('all', document.getElementById('tab-all'));
        currentIdx = currentFilteredList.indexOf(autoStartStation);
        loadStationInfo(currentIdx, true); 
        switchTab('player');
    } else {
        const heart10s = stations.find(s => s.name === "Heart 10s");
        if (heart10s) { heart10s.isInitialBgSource = true; fetchSilentMetadata(heart10s); }
        renderList('mine', document.getElementById('tab-mine'));
        loadStationInfo(0, false, true);
    }

    setupSwipe();
    setupFabSwipe();
    scanAllStations();

    audio.onwaiting = () => updateUI('loading');
    audio.onplaying = () => updateUI(true);
    audio.onpause = () => updateUI(false);
}

function transliterate(text) {
    if (!text) return "";
    let result = text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const cyrillicMap = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ы':'y','э':'e','ю':'yu','я':'ya'};
    return result.split('').map(char => cyrillicMap[char] || char).join('').replace(/[^a-z0-9]/g, '');
}

// --- METADATA & IMAGES ---

async function fetchSilentMetadata(station) {
    try {
        const response = await fetch(station.stream, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = parseInt(response.headers.get("icy-metaint"));
        if (!metaInt) { if(station.isInitialBgSource) applyImageToUI(station.originalImg, station); return; }

        let buffer = new Uint8Array();
        const { value } = await reader.read();
        let metaString = decoder.decode(value);
        let match = metaString.match(/StreamTitle='([^']*)'/);
        if (match && match[1]) {
            station.desc = match[1].replace(/;/g, "").trim();
            fetchAlbumArt(station.desc, station);
        } else if(station.isInitialBgSource) applyImageToUI(station.originalImg, station);
        reader.cancel();
    } catch(e) { if(station.isInitialBgSource) applyImageToUI(station.originalImg, station); }
}

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3) { applyImageToUI(stationRef.originalImg, stationRef); return; }
    let itunesFinished = false;

    if (stationRef.isInitialBgSource) {
        setTimeout(() => { if (!itunesFinished) applyImageToUI(stationRef.originalImg, stationRef); }, 2000);
    }

    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        itunesFinished = true;
        if (data.results?.length > 0) {
            const newImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            applyImageToUI(newImg, stationRef);
        } else applyImageToUI(stationRef.originalImg, stationRef);
    } catch (e) { itunesFinished = true; applyImageToUI(stationRef.originalImg, stationRef); }
}

function applyImageToUI(imgUrl, stationRef) {
    stationRef.img = imgUrl;
    if (stationRef.isInitialBgSource && audio.paused) {
        const bg1 = document.getElementById('bg-layer-1');
        bg1.style.backgroundImage = `url(${imgUrl})`;
        bg1.style.opacity = "1";
    }
    if (activeStationObject?.name === stationRef.name) updateArtUI(imgUrl);
    
    document.querySelectorAll(`.station-item[data-name="${stationRef.name}"]`).forEach(item => {
        item.querySelector('.station-thumb').src = imgUrl;
        item.querySelector('.station-desc').innerText = stationRef.desc;
    });
}

function updateArtUI(newImg) {
    const art = [document.getElementById('player-img-1'), document.getElementById('player-img-2')];
    const bg = [document.getElementById('bg-layer-1'), document.getElementById('bg-layer-2')];
    
    let nextIdx = activeArtLayer === 1 ? 1 : 0;
    let currIdx = activeArtLayer === 1 ? 0 : 1;

    art[nextIdx].src = newImg;
    bg[nextIdx].style.backgroundImage = `url(${newImg})`;
    art[nextIdx].classList.replace('art-hidden', 'art-visible');
    art[currIdx].classList.replace('art-visible', 'art-hidden');
    bg[nextIdx].style.opacity = '1';
    bg[currIdx].style.opacity = '0';
    
    activeArtLayer = activeArtLayer === 1 ? 2 : 1;
    activeBGLayer = activeArtLayer;
}

// --- UI CONTROL ---

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    document.querySelector('.content').scrollTop = 0;
    list.innerHTML = "";
    
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    currentFilteredList = stations.filter(s => s[`is${mode.charAt(0).toUpperCase() + mode.slice(1)}`] || mode === 'all');

    currentFilteredList.forEach((s) => {
        const isCurrent = (!audio.paused && activeStationObject?.name === s.name);
        const item = document.createElement('div');
        item.className = `station-item ${isCurrent ? 'is-playing' : ''}`;
        item.setAttribute('data-name', s.name); 
        item.innerHTML = `<img src="${s.img || FALLBACK_IMG}" class="station-thumb"><div style="flex:1"><div class="station-name">${s.name}</div><div class="station-desc">${s.desc}</div></div><div class="playing-icon"><span></span><span></span><span></span></div>`;
        item.onclick = () => { currentIdx = currentFilteredList.indexOf(s); playStation(); };
        list.appendChild(item);
    });
    lucide.createIcons();
}

function loadStationInfo(idx, sp = true, skipArt = false) {
    if (!currentFilteredList[idx]) return;
    const s = currentFilteredList[idx];
    if (sp) stations.forEach(st => st.isInitialBgSource = false);
    activeStationObject = s;

    if (ENABLE_DIRECT_LINKS) {
        const cleanName = transliterate(s.name).toLowerCase().replace(/\s+/g, '');
        window.history.replaceState({}, "", "/" + cleanName);
    }

    if (!skipArt) updateArtUI(s.img || FALLBACK_IMG);
    
    const ytBtn = document.getElementById('player-yt-btn');
    s.yt ? (ytBtn.href = s.yt, ytBtn.classList.remove('yt-hidden')) : ytBtn.classList.add('yt-hidden');

    if (metadataInterval) clearInterval(metadataInterval);
    audio.src = s.stream;
    if(sp) audio.play().catch(() => updateUI(false));
    
    updateSliderText();
    updateMediaSession(s);
    metadataInterval = setInterval(() => fetchSilentMetadata(s), 15000);
}

function updateUI(state) {
    const b = document.getElementById('play-trigger'), f = document.getElementById('fab-play-pause');
    const icons = { play: '<i data-lucide="play" fill="currentColor"></i>', pause: '<i data-lucide="pause" fill="currentColor"></i>', load: '<i data-lucide="loader-2" class="spin"></i>' };

    document.querySelectorAll('.station-item').forEach(i => i.classList.remove('is-playing'));
    if (state && activeStationObject) document.querySelector(`.station-item[data-name="${activeStationObject.name}"]`)?.classList.add('is-playing');

    const icon = state === 'loading' ? icons.load : (state === true ? icons.pause : icons.play);
    if(b) { b.innerHTML = icon; state === true ? b.classList.add('playing') : b.classList.remove('playing'); }
    if(f) { f.innerHTML = icon; state === true ? f.classList.add('playing') : f.classList.remove('playing'); }
    
    lucide.createIcons();
    checkHopeEffect();
}

// --- HOPE SPECIAL EFFECTS ---

function checkHopeEffect() {
    const isHope = activeStationObject?.name === "Hope" && !audio.paused;
    if (isHope) {
        if (!hopeInterval) hopeInterval = setInterval(createHeart, 350);
        if (!emojiInterval) {
            const titleEl = document.querySelector('#slide-current h2');
            if (titleEl && !titleEl.querySelector('span')) titleEl.innerHTML = `Hope <span>${hopeEmojis[0]}</span>`;
            emojiInterval = setInterval(rotateHopeEmoji, 5000);
        }
    } else {
        clearInterval(hopeInterval); hopeInterval = null;
        clearInterval(emojiInterval); emojiInterval = null;
    }
}

function rotateHopeEmoji() {
    const span = document.querySelector('#slide-current h2 span');
    if (span) {
        span.style.opacity = "0";
        setTimeout(() => {
            span.innerText = hopeEmojis[Math.floor(Math.random() * hopeEmojis.length)];
            span.style.opacity = "1";
        }, 650);
    }
}

function createHeart() {
    if (document.getElementById('player-view').style.display === 'none') return;
    const heart = document.createElement('div');
    heart.className = 'heart-particle'; heart.innerHTML = '💛';
    const rect = document.querySelector('.art-container').getBoundingClientRect();
    heart.style.left = `${rect.left + Math.random() * rect.width}px`;
    heart.style.top = `${rect.top + Math.random() * rect.height}px`;
    heart.style.setProperty('--move-x', `${(Math.random() - 0.5) * 150}px`);
    heart.style.setProperty('--move-y-start', `${(Math.random() - 0.5) * 50}px`);
    heart.style.setProperty('--random-rot', `${Math.random() * 180 - 90}deg`);
    heart.style.setProperty('--target-opacity', Math.random() * 0.4 + 0.3);
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}

// --- NAVIGATION & SWIPE ---

function switchTab(t) {
    const isList = t === 'list';
    document.getElementById('list-view').style.display = isList ? 'flex' : 'none';
    document.getElementById('player-view').style.display = isList ? 'none' : 'flex';
    document.getElementById('nav-list').classList.toggle('active', isList);
    document.getElementById('nav-player').classList.toggle('active', !isList);
    document.getElementById('main-nav').className = isList ? 'nav-bar on-radio' : 'nav-bar on-player';
    document.getElementById('fab-play-pause').style.display = isList ? 'flex' : 'none';
    checkHopeEffect();
}

function updateSliderText() {
    const getIdx = (off) => (currentIdx + off + currentFilteredList.length) % currentFilteredList.length;
    const update = (id, idx) => {
        const s = currentFilteredList[idx];
        const el = document.getElementById(id);
        const title = el.querySelector('h2');
        if (id === 'slide-current' && s.name === "Hope") title.innerHTML = `Hope <span>${hopeEmojis[0]}</span>`;
        else title.innerText = s.name;
        el.querySelector('p').innerText = s.desc;
    };
    update('slide-prev', getIdx(-1));
    update('slide-current', currentIdx);
    update('slide-next', getIdx(1));
}

function playStation() { updateSliderText(); loadStationInfo(currentIdx, true); switchTab('player'); }
function next() { currentIdx = (currentIdx + 1) % currentFilteredList.length; animateTransition('next'); }
function prev() { currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; animateTransition('prev'); }

function animateTransition(dir) {
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir==='next' ? 'translateX(-66.666%)' : 'translateX(0)';
    setTimeout(()=>{ wrapper.style.transition='none'; loadStationInfo(currentIdx, true); wrapper.style.transform = 'translateX(-33.333%)'; }, 600);
}

function setupSwipe() {
    [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')].forEach(z => {
        z.ontouchstart = e => { startX = e.touches[0].clientX; isDragging = true; wrapper.style.transition = 'none'; };
        z.ontouchmove = e => { if(!isDragging) return; wrapper.style.transform = `translateX(calc(-33.333% + ${((e.touches[0].clientX - startX) / window.innerWidth) * 33}%))`; };
        z.ontouchend = e => { 
            const d = e.changedTouches[0].clientX - startX;
            if(d > 60) prev(); else if(d < -60) next(); else { wrapper.style.transition = 'transform 0.4s ease'; wrapper.style.transform = 'translateX(-33.333%)'; }
            isDragging = false;
        };
    });
}

function setupFabSwipe() {
    const fab = document.getElementById('fab-play-pause');
    let fX, fY;
    fab.ontouchstart = e => { fX = e.touches[0].clientX; fY = e.touches[0].clientY; };
    fab.ontouchend = e => {
        const dX = e.changedTouches[0].clientX - fX, dY = e.changedTouches[0].clientY - fY;
        if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
            dY > 30 || dX < -30 ? next() : prev();
            showFabFeedback(dY > 30 || dX < -30 ? 'skip-forward' : 'skip-back');
        }
    };
}

function showFabFeedback(icon) {
    const iEl = document.querySelector('#fab-play-pause i');
    iEl.setAttribute('data-lucide', icon); lucide.createIcons();
    setTimeout(() => { iEl.setAttribute('data-lucide', audio.paused ? 'play' : 'pause'); lucide.createIcons(); }, 800);
}

function togglePlay() { audio.paused ? loadStationInfo(currentIdx, true) : audio.pause(); }

function scanAllStations() { stations.forEach(s => fetchSilentMetadata(s)); }

function updateMediaSession(s) {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({ title: s.desc, artist: s.name, album: "Sergiu FM", artwork: [{ src: s.img || FALLBACK_IMG, sizes: '512x512', type: 'image/png' }] });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', prev);
        navigator.mediaSession.setActionHandler('nexttrack', next);
    }
}

init();

</script>
