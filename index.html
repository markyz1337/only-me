<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio App</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f172a;
  color: white;
}

.header {
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.list {
  padding: 10px;
}

.radio {
  display: flex;
  align-items: center;
  background: #1e293b;
  margin-bottom: 12px;
  padding: 15px;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.radio:active {
  transform: scale(0.97);
}

.icon {
  width: 50px;
  height: 50px;
  border-radius: 12px;
  background: linear-gradient(45deg, #38bdf8, #6366f1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-right: 15px;
}

.info {
  flex: 1;
}

.name {
  font-size: 16px;
  font-weight: 600;
}

.play {
  background: #22c55e;
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="header">📻 Radiourile Mele</div>

<div class="list">

  <div class="radio" onclick="openRadio('http://155.133.23.121/hls/emisiunivechi/live.m3u8')">
    <div class="icon">🎙</div>
    <div class="info"><div class="name">Emisiuni Vechi</div></div>
    <button class="play">▶</button>
  </div>

  <div class="radio" onclick="openRadio('http://155.133.23.121/hls/manele/live.m3u8')">
    <div class="icon">🔥</div>
    <div class="info"><div class="name">Manele</div></div>
    <button class="play">▶</button>
  </div>

  <div class="radio" onclick="openRadio('URL_AICI')">
    <div class="icon">🎧</div>
    <div class="info"><div class="name">Radio 3</div></div>
    <button class="play">▶</button>
  </div>

  <div class="radio" onclick="openRadio('URL_AICI')">
    <div class="icon">📡</div>
    <div class="info"><div class="name">Radio 4</div></div>
    <button class="play">▶</button>
  </div>

  <div class="radio" onclick="openRadio('URL_AICI')">
    <div class="icon">🎶</div>
    <div class="info"><div class="name">Radio 5</div></div>
    <button class="play">▶</button>
  </div>

</div>

<script>
function openRadio(url) {
  window.open(url, '_blank'); // deschide stream-ul într-un tab nou
}
</script>

</body>
</html>
