<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0a15">
  <meta name="color-scheme" content="dark">

  <title>Sergiu R | Stations 🌅</title>

  <style>
    :root {
      --bg: #0a0a15;
      --glass: rgba(35, 35, 75, 0.16);
      --glass-border: rgba(160, 160, 255, 0.07);
      --text: #f1f5f9;
      --text-dim: #a0b0c0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      position: relative;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      box-shadow: 0 0 4px rgba(255,255,255,0.6);
      animation: twinkle infinite ease-in-out;
      will-change: opacity, transform;
    }

    @keyframes twinkle {
      0%, 100%   { opacity: 0.25; transform: scale(1); }
      50%        { opacity: 1.0;  transform: scale(1.3); }
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(10,10,21,0.82), rgba(26,27,46,0.88));
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
    }

.header h1 {
  font-size: 1.7rem !important;   /* !important forțează schimbarea */
  font-weight: 800;
  margin-bottom: 0.4rem;
}

    /* Gradient doar pe text, emoticonul rămâne colorat */
    .header h1 span {
      background: linear-gradient(90deg, #e0e7ff, #c4b5fd, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header p {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .station-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 1.1rem;
      padding: 1.1rem 1.3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.28s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.32);
    }

    .card:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 16px 48px rgba(0,0,0,0.42);
    }

    .name {
      font-size: 1.1rem;
      font-weight: 500;
    }

    button {
      background: linear-gradient(145deg, rgba(167,139,250,0.24), rgba(139,92,246,0.19));
      border: 1px solid rgba(167,139,250,0.32);
      color: white;
      font-weight: 550;
      padding: 0.7rem 1.4rem;
      border-radius: 0.9rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    button:hover {
      background: linear-gradient(145deg, rgba(167,139,250,0.42), rgba(139,92,246,0.35));
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(139,92,246,0.32);
    }

    @media (max-width: 400px) {
      .header h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <div class="stars">
    <!-- Stele generate automat prin JS mai jos -->
  </div>

  <div class="container">
    <div class="header">
      <h1><span>Sergiu R |  Stations</span> 🌅</h1>
      <p>Alege vibe-ul potrivit:</p>
    </div>

    <div class="station-list">
      <div class="card"><div class="name">📀 Mix 10s</div><button onclick="window.location='http://155.133.23.121/hls/radio/live.m3u8'">Play</button></div>
      <div class="card"><div class="name">⏳ Muzică veche</div><button onclick="window.location='http://155.133.23.121/hls/muzicaveche/live.m3u8'">Play</button></div>
      <div class="card"><div class="name">📟 Emisiuni vechi</div><button onclick="window.location='http://155.133.23.121/hls/emisiunivechi/live.m3u8'">Play</button></div>
      <div class="card"><div class="name">🎷 Manele</div><button onclick="window.location='http://155.133.23.121/hls/manele/live.m3u8'">Play</button></div>
      <div class="card"><div class="name">🌉 Pop actual</div><button onclick="window.location='http://155.133.23.121/hls/pop_actual/live.m3u8'">Play</button></div>
    </div>
  </div>

  <script>
    // Generare automată de 100 de stele random
    const starsContainer = document.querySelector('.stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = (Math.random() * 2.2 + 0.8) + 'px';
      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';
      star.style.animationDuration = (Math.random() * 5 + 3) + 's';
      star.style.animationDelay = Math.random() * 8 + 's';
      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
