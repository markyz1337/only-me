<head>

<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; -ms-overflow-style: none; }

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden; 
    display: flex; 
    justify-content: center;
    touch-action: pan-y; 
}

.app-container {
    width: 100%; max-width: 430px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

.bg-blur {
    position: absolute; 
    top: -10%; left: -10%; width: 120%; height: 120%;
    background-size: cover; background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; will-change: opacity, transform;
    animation: bgBreathe 30s infinite ease-in-out;
    transition: opacity 2.5s cubic-bezier(0.4, 0, 0.2, 1);
}

#bg-layer-1 { opacity: 1; }
#bg-layer-2 { opacity: 0; }

@keyframes bgBreathe {
    0%, 100% { transform: scale(1.0) rotate(0deg); }
    50% { transform: scale(1.1) rotate(5deg); }
}

.header-tabs { 
    position: relative; z-index: 10; 
    padding: 15px 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 500;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }
.tab:active { transform: scale(0.95); }

.content { position: relative; z-index: 10; flex: 1; padding: 0 20px 140px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.station-item { display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; }

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    transition: opacity 0.5s ease;
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { font-size: 11px; color: #b3b3b3; text-transform: uppercase; }
.station-desc.playing-now { color: #b3b3b3; font-weight: 400; text-transform: none; }

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }
.art-container { width: 100%; display: flex; justify-content: center; margin-bottom: 30px; }
.main-art { 
    width: 280px; height: 280px; border-radius: 30px; 
    box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; 
    transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease; 
}

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.4s ease;
}
.btn-round:active { transform: scale(0.8); background: rgba(255, 255, 255, 0.15); }

.btn-prev-anim i { animation: slideLeft 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
.btn-next-anim i { animation: slideRight 0.5s cubic-bezier(0.22, 1, 0.36, 1); }

@keyframes slideLeft { 0% { transform: translateX(0); opacity: 1; } 40% { transform: translateX(-10px); opacity: 0.6; } 100% { transform: translateX(0); opacity: 1; } }
@keyframes slideRight { 0% { transform: translateX(0); opacity: 1; } 40% { transform: translateX(10px); opacity: 0.6; } 100% { transform: translateX(0); opacity: 1; } }

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
.btn-play.playing { background: var(--accent); color: #fff; transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 94, 58, 0.4); }

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.8); backdrop-filter: blur(25px); border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
}
.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; transition: color 0.4s; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { position: absolute; bottom: 115px; right: 26px; background: var(--accent); width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(255,94,58,0.4); z-index: 15; transition: transform 0.2s; }
.fab:active { transform: scale(0.9); }
</style>
</head>
<body oncontextmenu="return false;">
<div class="app-container">
    <div class="bg-blur" id="bg-layer-1"></div>
    <div class="bg-blur" id="bg-layer-2"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab" id="tab-all" onclick="renderList('all', this)">All</div>
            <div class="tab active" id="tab-fav" onclick="renderList('fav', this)">Favorites</div>
            <div class="tab" id="tab-mine" onclick="renderList('mine', this)">Owned</div>
            <div class="tab" id="tab-russian" onclick="renderList('russian', this)">Russian</div>
        </div>
        <div class="content" id="stations-list"></div>

    </div>

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art" id="player-img" onerror="this.src=FALLBACK_IMG">
        </div>
        <div class="track-viewport" id="swipe-zone-text">
            <div class="track-slider-wrapper" id="info-wrapper">
                <div class="track-info-slide" id="slide-prev"><h2>Post Anterior</h2><p>Gen</p></div>
                <div class="track-info-slide" id="slide-current"><h2>Alege un post</h2><p>Radio Player</p></div>
                <div class="track-info-slide" id="slide-next"><h2>Post Următor</h2><p>Gen</p></div>
            </div>
        </div>
        <div class="main-controls">
            <div class="btn-round" id="btn-prev" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" id="btn-next" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>

    <div class="nav-bar on-radio" id="main-nav">
        <div class="nav-link" id="nav-player" onclick="switchTab('player')"><i data-lucide="play-circle"></i><span>Player</span></div>
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')"><i data-lucide="radio"></i><span>Radio</span></div>
    </div>
</div>

<audio id="audio-engine" preload="auto" crossorigin="anonymous"></audio>

<script>
let currentIdx = 0;
let currentFilteredList = []; 
let activeLayer = 1;
let startX = 0;
let isDragging = false;
let currentMetadataRequestId = 0;
let metadataInterval = null;

const audio = document.getElementById('audio-engine');
const wrapper = document.getElementById('info-wrapper');
const FALLBACK_IMG = "https://store-images.s-microsoft.com/image/apps.54675.13982720394888960.16320d2b-98f6-4b3b-af8d-f33140cf192a.778f4c59-a76c-44c0-82f7-bd7357649848";

const stations = [
    { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "POP, HITS, CHART", isFav: true, isAll: true },
    { name: "Kiss 10s", stream: "https://dc.digi.live.kissfm.ro/kiss.hits.from.the.10s/listen.m3u", img: "https://api.kissfm.ro/resized/streams/homepage/2025/01/10/cover-kiss-hits-from-the-10s_6210a8bb4e6b58d8b6d2c0342721cdb9.png", desc: "HITS FROM THE 10S", isFav: true, isAll: true },
    { name: "Millenium Hits", stream: "https://dc.digi.live.kissfm.ro/milleniumhits", img: "https://api.kissfm.ro/resized/streams/homepage/2024/10/07/homepage-logo-kiss-millenium-hits_bd81e49f11f3edfff722aecb28f9ae34.png", desc: "KISS MILLENIUM HITS", isFav: true, isAll: true },
    { name: "ONE FM DANCE", stream: "https://live.onefm.ro/onefm.aacp", img: "https://onefm.es/wp-content/uploads/2023/09/LOGO-2025.jpg", desc: "DANCE, HOUSE, TECHNO", isFav: true, isAll: true },
    { name: "Positively 10s", stream: "https://streaming.positivity.radio/pr/posi10s/icecast.audio", img: "https://cdn.autopo.st/images/coverart/r/Roll_Deep_-_Good_Times.jpg", desc: "10S HITS, POSITIVE", isFav: true, isAll: true },
    { name: "PRO DJ RADIO", stream: "http://live.prodjradio.net:8000/;?type=http&nocache=4585", img: "https://myradioonline.ro/public/uploads/radio_img/pro-dj-radio/play_250_250.webp", desc: "DJ MIX, CLUB, DANCE", isFav: true, isAll: true },
    { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://is1-ssl.mzstatic.com/image/thumb/Podcasts221/v4/0e/fe/53/0efe532a-3cee-6c89-1d8d-c9f18284c0f2/mza_5165669991707061934.jpg/1200x1200bf-60.jpg", desc: "RECORD RUSSIAN MIX", isRussian: true, isAll: true },
    { name: "DFM Pop", stream: "https://dfm-popgold10.hostingradio.ru/popgold1096.aacp", img: "https://radiopotok.com/assets/image/radio/180/dfmpopdance.jpg", desc: "POP GOLD, HITS", isRussian: true, isAll: true },
    { name: "DFM DANCE", stream: "https://dfm-dancegold10.hostingradio.ru/dancegold1096.aacp", img: "https://americadance90.com.br/wp-content/uploads/2024/05/DFM-Dance-Gold-90s.png", desc: "DANCE GOLD, 90S", isRussian: true, isAll: true },
    { name: "Emisiuni Radio Vechi", stream: "http://155.133.23.121/hls/emisiunivechi/live.m3u8", img: "https://yt3.googleusercontent.com/ytc/AIdro_mH-dA0beci-h-44yevlAUUDaajRWTiBcdverBGK7XXBw=s900-c-k-c0x00ffffff-no-rj", desc: "KISS FM | RADIO 21 | RADIO ZU", isMine: true },
    { name: "Muzică Veche", stream: "http://155.133.23.121/hls/muzicaveche/live.m3u8", img: "https://i.scdn.co/image/ab67616d0000b27316eb598cccbced4c4ac6bbbf", desc: "Muzica pe care am crescut", isMine: true },
    { name: "Manele", stream: "http://155.133.23.121/hls/manele/live.m3u8", img: "https://image-cdn-ak.spotifycdn.com/image/ab67706c0000da842dd25b4dde6d46673b953a6e", desc: "Gypsy Team", isMine: true },
    { name: "Speranță", stream: "http://155.133.23.121/hls/hope/live.m3u8", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8aX5i1Sosu19dYGhKZwB3XHN2aFFLnuPUToBVDQVjOplOdpr5q3ZxEy8&s=10", desc: "LA FEL CA MINE", isMine: true }
];

stations.forEach(s => { 
    s.originalDesc = s.desc; 
    s.originalImg = s.img; 
    s.currentTrack = ""; // Salvăm piesa curentă pentru a evita flicker-ul
});

function init() {
    renderList('all', document.getElementById('tab-all')); 
    lucide.createIcons();
    updateSliderText();
    loadStationInfo(0, false);
    setupSwipe();
    scanAllStations();

    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
}

function scanAllStations() {
    stations.forEach(s => {
        if (!s.stream.includes('.m3u8')) { fetchSilentMetadata(s); }
    });
}

async function fetchSilentMetadata(station) {
    try {
        const response = await fetch(station.stream, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = parseInt(response.headers.get("icy-metaint"));
        if (!metaInt) return;

        let buffer = new Uint8Array();
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            let temp = new Uint8Array(buffer.length + value.length);
            temp.set(buffer); temp.set(value, buffer.length);
            buffer = temp;

            while (buffer.length >= metaInt + 1) {
                let metaLength = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + metaLength) break;
                let metadata = buffer.slice(metaInt + 1, metaInt + 1 + metaLength);
                let metaString = decoder.decode(metadata);
                let match = metaString.match(/StreamTitle='([^']*)'/);
                if (match && match[1]) {
                    let title = match[1].replace(/;/g, "").trim();
                    if(station.currentTrack !== title) {
                        station.desc = title;
                        station.currentTrack = title;
                        updateUIMetadata(station);
                    }
                    reader.cancel(); return;
                }
                buffer = buffer.slice(metaInt + 1 + metaLength);
            }
        }
    } catch(e) {}
}

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3) return;
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
            const newImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            
            // Doar dacă imaginea e diferită de cea actuală, facem swap
            if(stationRef.img === newImg) return;
            stationRef.img = newImg;
            
            // Update în PLAYER
            if (currentFilteredList[currentIdx] === stationRef) {
                const pImg = document.getElementById('player-img');
                pImg.style.opacity = '0';
                setTimeout(() => {
                    pImg.src = newImg;
                    pImg.style.opacity = '1';
                    const activeBG = activeLayer === 1 ? document.getElementById('bg-layer-1') : document.getElementById('bg-layer-2');
                    activeBG.style.backgroundImage = `url(${newImg})`;
                }, 250);
            }
            
            // Update în LISTĂ
            const listItems = document.querySelectorAll('.station-item');
            listItems.forEach(item => {
                if (item.querySelector('.station-name').innerText === stationRef.name) {
                    const thumb = item.querySelector('.station-thumb');
                    thumb.style.opacity = '0';
                    setTimeout(() => {
                        thumb.src = newImg;
                        thumb.style.opacity = '1';
                    }, 250);
                }
            });
        }
    } catch (e) {}
}

function updateUIMetadata(station) {
    fetchAlbumArt(station.desc, station);

    if (currentFilteredList[currentIdx] === station) {
        const slide = document.getElementById('slide-current');
        if (slide) slide.querySelector('p').innerText = station.desc;
        if ('mediaSession' in navigator && navigator.mediaSession.metadata) {
            navigator.mediaSession.metadata.title = station.desc;
        }
    }

    const listItems = document.querySelectorAll('.station-item');
    listItems.forEach(item => {
        if (item.querySelector('.station-name').innerText === station.name) {
            const descEl = item.querySelector('.station-desc');
            descEl.innerText = station.desc;
            descEl.classList.add('playing-now');
        }
    });
}

function updateMediaSession(station) {
    if ('mediaSession' in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: station.desc,
            artist: station.name,
            album: "Sergiu FM",
            artwork: [{ src: station.img || FALLBACK_IMG, sizes: '512x512', type: 'image/png' }]
        });
        navigator.mediaSession.setActionHandler('play', () => audio.play());
        navigator.mediaSession.setActionHandler('pause', () => audio.pause());
        navigator.mediaSession.setActionHandler('previoustrack', () => prev());
        navigator.mediaSession.setActionHandler('nexttrack', () => next());
    }
}

async function fetchMetadata(streamUrl, stationRef) {
    const requestId = ++currentMetadataRequestId;
    try {
        const response = await fetch(streamUrl, { headers: { "Icy-MetaData": "1" } });
        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let metaInt = response.headers.get("icy-metaint");
        if (!metaInt) return;
        metaInt = parseInt(metaInt);
        let buffer = new Uint8Array();

        while (true) {
            const { done, value } = await reader.read();
            if (done || requestId !== currentMetadataRequestId) break;
            let temp = new Uint8Array(buffer.length + value.length);
            temp.set(buffer); temp.set(value, buffer.length);
            buffer = temp;

            while (buffer.length >= metaInt + 1) {
                let metaLength = buffer[metaInt] * 16;
                if (buffer.length < metaInt + 1 + metaLength) break;
                let metadata = buffer.slice(metaInt + 1, metaInt + 1 + metaLength);
                let metaString = decoder.decode(metadata);
                let match = metaString.match(/StreamTitle='([^']*)'/);
                if (match && match[1]) {
                    let newTitle = match[1].replace(/;/g, "").trim();
                    // VERIFICARE CRITICĂ: Dacă piesa e aceeași, ignorăm pentru a opri clipirea
                    if (stationRef.currentTrack !== newTitle) {
                        stationRef.desc = newTitle;
                        stationRef.currentTrack = newTitle;
                        updateUIMetadata(stationRef);
                    }
                }
                buffer = buffer.slice(metaInt + 1 + metaLength);
            }
        }
    } catch (err) {}
}

function renderList(mode, el) {
    const list = document.getElementById('stations-list');
    list.innerHTML = "";
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    currentFilteredList = stations.filter(s => {
        if (mode === 'all') return s.isAll || s.isMine;
        if (mode === 'fav') return s.isFav;
        if (mode === 'russian') return s.isRussian;
        if (mode === 'mine') return s.isMine;
        return false;
    });
    currentFilteredList.forEach((s, i) => {
        const item = document.createElement('div');
        item.className = 'station-item';
        item.innerHTML = `
            <img src="${s.img || FALLBACK_IMG}" class="station-thumb" onerror="this.src=FALLBACK_IMG">
            <div style="flex:1">
                <div class="station-name">${s.name}</div>
                <div class="station-desc ${s.desc !== s.originalDesc ? 'playing-now' : ''}">${s.desc}</div>
            </div>`;
        item.onclick = () => { 
            if (s.isMine) { window.location.href = s.stream; } 
            else { currentIdx = currentFilteredList.indexOf(s); playStation(); }
        };
        list.appendChild(item);
    });
}

function updateSliderText() {
    if (currentFilteredList.length === 0) return;
    const prevIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    const nextIdx = (currentIdx + 1) % currentFilteredList.length;
    updateSlide('slide-prev', currentFilteredList[prevIdx]);
    updateSlide('slide-current', currentFilteredList[currentIdx]);
    updateSlide('slide-next', currentFilteredList[nextIdx]);
}

function updateSlide(id, data) {
    const el = document.getElementById(id);
    el.querySelector('h2').innerText = data.name;
    el.querySelector('p').innerText = data.desc;
}

function loadStationInfo(idx, shouldPlay = true) {
    if (currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];

    // Resetăm imaginea la logo dacă nu avem încă o piesă activă
    document.getElementById('player-img').src = s.img || FALLBACK_IMG;
    document.getElementById('player-img').style.opacity = '1';
    
    if (metadataInterval) clearInterval(metadataInterval);
    currentMetadataRequestId++; 
    audio.src = s.stream;
    updateMediaSession(s);

    const l1 = document.getElementById('bg-layer-1');
    const l2 = document.getElementById('bg-layer-2');
    const nextL = activeLayer === 1 ? l2 : l1;
    const prevL = activeLayer === 1 ? l1 : l2;
    nextL.style.backgroundImage = `url(${s.img || FALLBACK_IMG})`;
    nextL.style.opacity = '1';
    prevL.style.opacity = '0';
    activeLayer = activeLayer === 1 ? 2 : 1;
    
    // Declanșăm metadatele după 1 secundă
    setTimeout(() => {
        fetchMetadata(s.stream, s);
        if (metadataInterval) clearInterval(metadataInterval);
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000);
    }, 1000);

    if(shouldPlay) { updateUI('loading'); audio.play().catch(()=>{}); }
}

function playStation() { updateSliderText(); loadStationInfo(currentIdx, true); switchTab('player'); }

function next() { 
    const btn = document.getElementById('btn-next');
    btn.classList.add('btn-next-anim');
    setTimeout(() => btn.classList.remove('btn-next-anim'), 500);
    currentIdx = (currentIdx + 1) % currentFilteredList.length; 
    animateTransition('next'); 
}

function prev() { 
    const btn = document.getElementById('btn-prev');
    btn.classList.add('btn-prev-anim');
    setTimeout(() => btn.classList.remove('btn-prev-anim'), 500);
    currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; 
    animateTransition('prev'); 
}

function animateTransition(dir) {
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir==='next' ? 'translateX(-66.666%)' : 'translateX(0)';
    setTimeout(()=>{ 
        wrapper.style.transition='none';
        loadStationInfo(currentIdx, true);
        updateSliderText();
        wrapper.style.transform = 'translateX(-33.333%)';
    }, 600);
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e=>{ startX=e.touches[0].clientX; isDragging=true; wrapper.style.transition='none'; }, {passive: true});
        z.addEventListener('touchmove', e=>{ if(!isDragging) return; const d = e.touches[0].clientX-startX; wrapper.style.transform = `translateX(calc(-33.333% + ${(d/window.innerWidth)*33}%))`; }, {passive: true});
        z.addEventListener('touchend', e=>{ 
            if(!isDragging) return;
            const d = e.changedTouches[0].clientX - startX;
            if(d>60) prev(); else if(d<-60) next(); else {
                wrapper.style.transition = 'transform 0.4s ease';
                wrapper.style.transform='translateX(-33.333%)';
            }
            isDragging=false;
        });
    });
}

function togglePlay() {
    if(audio.paused){ updateUI('loading'); audio.play().catch(()=>{}); } 
    else { audio.pause(); }
}

function switchTab(t) {
    const nav = document.getElementById('main-nav');
    if(t==='list'){ 
        document.getElementById('list-view').style.display='flex'; 
        document.getElementById('player-view').style.display='none';
        document.getElementById('nav-list').classList.add('active'); 
        document.getElementById('nav-player').classList.remove('active'); 
        nav.className = 'nav-bar on-radio';
    } else { 
        document.getElementById('list-view').style.display='none'; 
        document.getElementById('player-view').style.display='flex';
        document.getElementById('nav-list').classList.remove('active'); 
        document.getElementById('nav-player').classList.add('active'); 
        nav.className = 'nav-bar on-player';
    }
}

function updateUI(state){ 
    const b = document.getElementById('play-trigger'); 
    if(state === 'loading') { b.innerHTML='<i data-lucide="loader-2" class="spin"></i>'; b.classList.remove('playing'); }
    else if(state === true){ b.innerHTML='<i data-lucide="pause" fill="currentColor"></i>'; b.classList.add('playing'); }
    else{ b.innerHTML='<i data-lucide="play" fill="currentColor"></i>'; b.classList.remove('playing'); }
    lucide.createIcons();
}

init();
</script>
</body>
</html>
