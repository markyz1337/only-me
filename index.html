<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Player</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    display: flex;
    justify-content: center;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

.title {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 20px;
    text-align: center;
}

.card {
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

.card:active {
    transform: scale(0.97);
}

.name {
    font-size: 16px;
}

button {
    border: none;
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
    color: white;
    font-weight: 500;
    cursor: pointer;
}

button:hover {
    background: rgba(255,255,255,0.25);
}
</style>
</head>
<body>

<div class="container">
    <div class="title">🎧 Radiourile mele</div>

    <div class="card">
        <div class="name">Emisiuni Vechi</div>
        <button onclick="window.location.href='http://155.133.23.121/hls/emisiunivechi/live.m3u8'">Play</button>
    </div>

    <div class="card">
        <div class="name">Manele</div>
        <button onclick="window.location.href='http://155.133.23.121/hls/manele/live.m3u8'">Play</button>
    </div>

    <div class="card">
        <div class="name">Pop Actual</div>
        <button onclick="window.location.href='http://155.133.23.121/hls/pop_actual/live.m3u8'">Play</button>
    </div>

    <div class="card">
        <div class="name">Radio General</div>
        <button onclick="window.location.href='http://155.133.23.121/hls/radio/live.m3u8'">Play</button>
    </div>

    <div class="card">
        <div class="name">Muzică Veche</div>
        <button onclick="window.location.href='http://155.133.23.121/hls/muzicaveche/live.m3u8'">Play</button>
    </div>
</div>

</body>
</html>
