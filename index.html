<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

.bg-blur, .main-art {
    will-change: transform, opacity;
    contain: paint;
}


/* Previne flash-ul de conținut la încărcare */
.app-container {
    opacity: 0;
    transition: opacity 0.3s ease-in;
}
.app-ready .app-container {
    opacity: 1;
}



.search-trigger-btn {
    position: absolute;
    top: 15px;
    left: 30%;
    transform: translateX(-5%) scale(0.9);
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 6px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    z-index: 40;

    /* Starea inițială (Ascuns) */
    opacity: 0;
    visibility: hidden;
    /* La ieșire (FadeOut): Tranziție liniară și simplă pentru fluiditate */
    transition: opacity 0.5s ease-in-out, 
                transform 0.5s ease-in-out, 
                visibility 0.5s;
}

.search-trigger-btn.is-visible {
    opacity: 1;
    visibility: visible;
    transform: translateX(-5%) scale(1);
    /* La intrare (FadeIn): Efect elastic "premium" */
    transition: opacity 0.6s ease-out, 
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}


/* Efect de apăsare */
.search-trigger-btn:active { 
    transform: translateX(-5%) scale(0.95); 
    background: rgba(255, 255, 255, 0.2); 
}






/* Popup Overlay - Modificat pentru a-l urca mai sus */
.search-popup-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.3);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    z-index: 1000;
    display: none;
    
    /* MODIFICARE: Aliniere spre partea de sus */
    align-items: flex-start; 
    justify-content: center;
    
    /* MODIFICARE: Spațiu de la marginea de sus (ajustează 15% după preferință) */
    padding-top: 15vh; 
    
    opacity: 0;
    transition: opacity 0.3s ease;
}

.search-popup-content {
    background: rgba(40, 40, 40, 0.4);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    width: 280px;
    border-radius: 24px;
    padding: 20px;
    
    /* MODIFICARE: Pornim de la o poziție puțin mai joasă pentru animația de urcare */
    transform: translateY(20px) scale(0.8);
    
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* Când este activ, ajunge la poziția finală */
.search-popup-overlay.active .search-popup-content { 
    transform: translateY(0) scale(1); 
}


.search-popup-overlay.active { display: flex; opacity: 1; }
.search-popup-overlay.active .search-popup-content { transform: scale(1); }

.search-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px;
    margin-bottom: 8px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    cursor: pointer;
    transition: background 0.2s;
}

.search-option:last-child { margin-bottom: 0; }
.search-option:active { background: rgba(255, 255, 255, 0.15); }

.search-option img { 
    width: 28px; 
    height: 28px; 
    object-fit: cover; /* Asigură că imaginea umple spațiul fără să se deformeze */
    
    /* MODIFICĂRILE PENTRU COLȚURI: */
    border-radius: 8.5px; /* Pentru colțuri ușor rotunjite (stil aplicație) */
    /* SAU folosește: border-radius: 50%; pentru iconițe perfect rotunde */
    
    flex-shrink: 0; /* Previne turtirea iconiței dacă textul e prea lung */
}
.search-option span { font-weight: 500; font-size: 14px; }



/* Stil de bază pentru punctul On Air (PÂLPÂIT PERMANENT) */
.live-dot {
    height: 9px;
    width: 9px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
    /* Animația se aplică mereu */
    animation: blink-on-air 1.8s infinite ease-in-out;
}

/* STARE: Când NU ești pe tab-ul Owned (Roșu intens) */
#tab-mine .live-dot {
    background-color: #ff0000;
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.7);
}

/* STARE: Când ești pe tab-ul Owned (Alb) */
#tab-mine.active .live-dot {
    background-color: #ff0000;
    box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.9);
}

/* O singură animație care pulsează opacitatea și umbra */
@keyframes blink-on-air {
    0% { 
        opacity: 1; 
        transform: scale(1); 
    }
    50% { 
        opacity: 0.35; 
        transform: scale(0.9); 
    }
    100% { 
        opacity: 1; 
        transform: scale(1); 
    }
}

.tab {
    display: flex;
    align-items: center;
    justify-content: center;
}






/* Doar emoji-ul va face fade, textul "Hope" rămâne fix */
#slide-current h2 span {
    transition: opacity 0.6s ease-in-out;
    display: inline-block;
    will-change: opacity;
}



/* Stiluri pentru Egalizatorul din Listă */
.playing-icon {
    display: none;
    align-items: flex-end;
    gap: 2px;
    width: 20px;
    height: 20px;
    margin-left: 10px;
}

.station-item.is-playing .playing-icon {
    display: flex;
}

.playing-icon span {
    display: inline-block;
    width: 3px;
    background: linear-gradient(to top, var(--accent), #ff9d85); 
    border-radius: 2px;
    animation: bounce 0.5s ease-in-out infinite alternate;
    box-shadow: 0 0 3px var(--accent), 0 0 5px rgba(255, 94, 58, 0.4);
}

.station-item.is-playing .station-name {
    color: var(--accent);
    text-shadow: 0 0 25px var(--accent), 0 0 6px rgba(255, 94, 58, 0.2);
    transition: all 0.4s ease;
}

.playing-icon span:nth-child(2) { animation-duration: 0.7s; }
.playing-icon span:nth-child(3) { animation-duration: 0.6s; }

@keyframes bounce {
    from { height: 5px; }
    to { height: 18px; }
}


/* Ascunde bara de scroll pentru Chrome, Safari și Opera */
::-webkit-scrollbar {
    display: none;
}

/* Ascunde bara de scroll pentru Firefox */
* {
    scrollbar-width: none;
}

/* Ascunde bara pentru IE și Edge vechi */
* {
    -ms-overflow-style: none;
}



.fab-search {
    left: 31px; /* Poziționat în oglindă față de butonul Play */
    right: auto;
    background: var(--glass) !important;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    color: white !important;
}

.fab-search:active {
    transform: scale(0.9) translateY(0);
}

/* Stil pentru input-ul de search (opțional, dacă vrei un prompt curat) */
.search-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    padding-top: 100px;
}




body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    display: flex; 
    justify-content: center;
    touch-action: pan-y;
}









/* Modificări la Containerul Telefonului */
.app-container {
    width: 395px; 
    height: 750px; 
    position: relative;
    z-index: 10; /* Stă deasupra aurei */
    display: flex; 
    flex-direction: column;
    
    /* Fundal semi-transparent cu blur intern (Glassmorphism) */
    background: rgba(0, 0, 0, 0.5); 
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    
    border-radius: 40px; 
    border: 7px solid #1a1a1a;
    box-shadow: 0 0 50px rgba(0,0,0,0.8);
    overflow: hidden; /* Conținutul listelor rămâne tăiat corect de ramă */
    
    transform-origin: center center;
    flex-shrink: 0;
    will-change: transform;
}



/* Stilul pentru Aura (Fundalul din spatele ramei) */
.bg-blur {
    position: absolute; 
    z-index: 1; /* Stă sub telefon */
    
    /* Dimensiuni raportate la baza de 395x750px */
    width: calc(395px * 0.94);  /* 130% Lățime */
    height: calc(750px * 0.9); /* 120% Înălțime */
    
    background-size: cover; 
    background-position: center;
    filter: blur(50px) brightness(1) saturate(1.4);
    border-radius: 80px; /* Urmează forma telefonului dar mai difuz */
    
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity, transform;
    pointer-events: none; /* Nu blochează atingerile pe ecran */
}

.header-tabs { 
    position: absolute;
    top: 0; 
    left: 0; 
    width: 100%;
    z-index: 30;
    padding-top: 25px; /* Spațiu fix de sus */
    padding-bottom: 20px; 
    display: flex; 
    justify-content: center;
    gap: 10px; 
    background: transparent; 
    pointer-events: none;
}


.header-tabs .tab {
    pointer-events: auto; /* Reactivăm click-ul doar pe butoane */
}


.tab { 
    background: rgba(250, 250, 250, 0.11); 
    padding: 8px 17px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    border: 1px solid rgba(250,250,250,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { 
    /* Fundalul devine un alb translucid mai opac decât cel standard (care e 0.1) */
    background: rgba(250, 250, 250, 0.16); 
    border-color: rgba(250, 250, 250, 0.18); 
    font-weight: 900; 
    color: #ffffff; /* Asigură-te că textul rămâne alb */
}
.tab:active { transform: scale(0.99); }

.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    /* Padding fix: sus (pentru tab-uri), lateral, jos (pentru nav bar) */
    padding: 65px 20px 100px 20px; 
    overflow-y: auto; 
    overscroll-behavior-y: contain; 
    -webkit-overflow-scrolling: touch; 

    -webkit-mask-image: linear-gradient(to bottom, 
        transparent 0%, 
        black 10%, 
        black 90%, 
        transparent 100%
    );
    mask-image: linear-gradient(to bottom, 
        transparent 0%, 
        black 10%, 
        black 90%, 
        transparent 100%
    );
}


.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}


.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
    cursor: pointer; 
    transition: opacity 0.8s ease, transform 0.5s ease;
}

.station-name { 
    font-weight: 600; 
    font-size: 16px; 
    margin-bottom: 4px; 
}

.station-desc { 
    font-size: 11px; color: #b3b3b3; text-transform: uppercase;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;  
    overflow: hidden; line-height: 1.4; max-height: 2.8em;
    transition: color 0.5s ease;
}

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 100px 0; }

.art-container { width: 250px; height: 250px; position: relative; margin-bottom: 25px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { 
    font-size: 24px; 
    font-weight: 600; 
    margin-bottom: 8px; 
    
    /* Permite maximum 2 rânduri */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;  
    overflow: visible; /* Schimbat din hidden în visible pentru a nu tăia glifele */
    
    /* Centrare și spațiere */
    line-height: 1.3; /* Crescut de la 1.2 la 1.3 */
    max-height: 2.6em; 
    white-space: normal; 
    text-overflow: ellipsis;
    
    /* FIX pentru litere tăiate la margine */
    padding: 0 4px; 
    box-sizing: border-box;
}

.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; line-height: 1.5; min-height: 3em; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}

.btn-play { background: #fff; color: #000; width: 75px; height: 75px; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.btn-play.playing { 
    background: var(--accent); 
    color: #fff; 
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 15px rgba(255, 94, 58, 0.3); transform: scale(1.05); }
    50% { box-shadow: 0 0 50px rgba(255, 94, 58, 0.7); transform: scale(1.10); }
}

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.nav-bar { 
    position: absolute; bottom: 20px; left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.7); /* Fundal mai opac la start */
    backdrop-filter: blur(25px); 
    -webkit-backdrop-filter: blur(25px); /* Fix pentru Safari/iOS */
    border-radius: 40px; 
    display: flex; justify-content: space-around; padding: 8px; 
    border: 1px solid rgba(255,255,255,0.08); 
    
    /* Adaugă aceste linii pentru animație */
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
}

/* Clasa care va fi activată din JS */
.nav-bar.visible {
    opacity: 1;
    transform: translateY(0);
}


.nav-bar::before {
    content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px);
    background: rgba(255, 255, 255, 0.08); border-radius: 35px;
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1;
}
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i { color: var(--accent); }

.fab { 
    position: absolute; 
    bottom: 115px; 
    right: 31px; 
    background: #fff; 
    color: #000;      
    width: 56px; 
    cursor: pointer;
    height: 56px; 
    border-radius: 50%; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
    z-index: 15; 
    
    /* Starea inițială pentru animație */
    opacity: 0;
    transform: translateY(20px) scale(0.8);
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), 
                opacity 0.6s ease-out, 
                transform 0.9s cubic-bezier(0.23, 1, 0.32, 1);
}

/* Clasa care va declanșa apariția */
.fab.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* Păstrăm efectul de puls neschimbat, dar adăugăm .visible pentru siguranță */
.fab.playing.visible {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
}


.fab.playing {
    background: var(--accent); 
    color: #fff;               
    transform: scale(1.1);
    box-shadow: 0 0 30px rgba(255, 94, 58, 0.6);
    animation: pulseGlow 3s infinite ease-in-out;
}



/* Containerul Părinte care centrează totul */
#app-scaler {
    width: 100vw;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    overflow: visible; /* CRITIC: Permite fundalului să iasă în exterior */
    position: relative;
    touch-action: none;
}

/* Ajustare Body pentru a suporta scalarea corect */
body {
    background: #000; /* Fundal negru sub aplicația scalată */
    overflow: hidden;
    touch-action: none;
}

function next() { 
    if (!currentFilteredList || currentFilteredList.length === 0) return;

    const isPlayerVisible = document.getElementById('player-view').style.display === 'flex';

    if (isPlayerVisible) {
        if (isTransitioning) return; 
        currentIdx = (currentIdx + 1) % currentFilteredList.length; 
        animateTransition('next'); 
    } else {
        // Schimbăm indexul
        currentIdx = (currentIdx + 1) % currentFilteredList.length; 
        // Forțăm încărcarea și PLAY (true)
        loadStationInfo(currentIdx, true, false);
        updateSliderText();
    }
}

function prev() { 
    if (!currentFilteredList || currentFilteredList.length === 0) return;

    const isPlayerVisible = document.getElementById('player-view').style.display === 'flex';

    if (isPlayerVisible) {
        if (isTransitioning) return; 
        currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; 
        animateTransition('prev'); 
    } else {
        currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length; 
        // Forțăm încărcarea și PLAY (true)
        loadStationInfo(currentIdx, true, false);
        updateSliderText();
    }
}


function encodeStreamToPath(url, name) {
    try {
        let cleanUrl = url.replace('https://', '').replace('http://', '');
        let urlPart = cleanUrl.replace(/\./g, '_').replace(/:/g, '-').replace(/\//g, '~');
        let namePart = encodeURIComponent(name.replace(/\s+/g, '_'));
        return namePart + "~~" + urlPart;
    } catch (e) { return "Radio_Extern~~external_radio"; }
}

function decodePathToStream(path) {
    let clean = path.replace(/^url\//, '').replace(/^url~/, '');
    let parts = clean.split('~~');
    let rawName = parts.length > 1 ? parts[0] : "Radio Extern";
    let rawUrl = parts.length > 1 ? parts[1] : parts[0];
    return {
        name: decodeURIComponent(rawName).replace(/_/g, ' '),
        stream: "https://" + rawUrl.replace(/_/g, '.').replace(/-/g, ':').replace(/~/g, '/')
    };
}




function applySmartScaling() {
    const container = document.querySelector('.app-container');
    const bgLayers = document.querySelectorAll('.bg-blur'); // Selectăm ambele straturi de blur
    
    if (!container) return;

    const winW = window.innerWidth;
    const winH = window.innerHeight;
    
    const docW = 395;
    const docH = 750;

    const scaleHeight = (winH * 0.90) / docH;
    const scaleWidth = (winW * 0.90) / docW;
    const finalScale = Math.min(scaleHeight, scaleWidth);

    // Aplicăm aceeași scalare și telefonului și fundalului din spate
    const transformValue = `scale(${finalScale})`;
    
    container.style.transform = transformValue;
    
    bgLayers.forEach(bg => {
        bg.style.transform = transformValue;
    });
}

// Nu uita să apelezi funcția la resize și load
window.addEventListener('resize', applySmartScaling);
window.addEventListener('load', applySmartScaling);
applySmartScaling();





function getOptimizedImg(url) {
    if (!url || typeof url !== 'string' || url.length < 10 || url.includes('googleusercontent')) {
        return null; 
    }

    // Dacă imaginea este deja de pe weserv.nl, extragem URL-ul original 
    // și îl re-procesăm curat pentru a evita parametrii dublați
    let cleanUrl = url;
    if (url.includes('images.weserv.nl/?url=')) {
        const urlParams = new URLSearchParams(url.split('?')[1]);
        cleanUrl = urlParams.get('url');
    }

    // Returnăm URL-ul optimizat cu parametrii corecți
    return `https://images.weserv.nl/?url=${encodeURIComponent(cleanUrl)}&w=450&h=450&fit=cover&output=webp&q=80&errorredirect=${encodeURIComponent(FALLBACK_IMG)}`;
}




async function openSearch() {
    const query = prompt("Caută un post de radio:");
    if (!query || query.length < 2) return;

    const searchBtn = document.getElementById('fab-search');
    const originalIcon = searchBtn.innerHTML;
    searchBtn.innerHTML = '<i data-lucide="loader-2" class="spin"></i>';
    lucide.createIcons();

    try {
        // Interogăm API-ul (limită 100 pentru a avea de unde filtra)
        const response = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(query)}?limit=100`);
        const results = await response.json();

        // FILTRARE: Doar fluxuri securizate HTTPS
        const secureResults = results.filter(r => r.url_resolved && r.url_resolved.startsWith('https'));

        if (secureResults.length === 0) {
            alert("Niciun rezultat HTTPS găsit.");
        } else {
            const newStations = secureResults.map(r => {
                // Curățăm numele pentru a nu fi prea lung
                let cleanName = r.name.split('[')[0].split('(')[0].trim();
                if (cleanName.length > 28) cleanName = cleanName.substring(0, 25) + "...";

                // Extragere țară (ex: RO, RU, US) sau fallback dacă lipsește
                const country = r.countrycode ? r.countrycode.toUpperCase() : "INTL";
                // Extragere tag principal (gen muzical)
                const tag = (r.tags || "Radio").split(',')[0].toUpperCase();

                return {
                    name: cleanName,
                    stream: r.url_resolved,
                    img: (r.favicon && r.favicon.startsWith('http')) ? r.favicon : FALLBACK_IMG,
                    // Format: "RO | POP"
                    desc: `${country} | ${tag}`,
                    isAll: true,
                    isSearch: true
                };
            });

            currentFilteredList = newStations;
            currentIdx = 0;
            
            renderSearchResults(newStations);
            
            // Activăm tab-ul All vizual
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-all').classList.add('active');
        }
    } catch (error) {
        console.error("Search error:", error);
        alert("Eroare la conexiune.");
    } finally {
        searchBtn.innerHTML = originalIcon;
        lucide.createIcons();
    }
}





function renderSearchResults(results) {
    const list = document.getElementById('stations-list');
    const scrollContainer = document.querySelector('.content');
    
    // 1. Curățăm lista actuală
    list.innerHTML = "";
    
    // 2. CRITIC: Actualizăm lista filtrată globală cu noile rezultate de căutare
    // Acest pas este esențial pentru ca funcțiile next/prev și switchTab să aibă referință corectă
    currentFilteredList = results;

    if (results.length === 0) {
        list.innerHTML = "<div style='padding:20px; text-align:center; color:#777;'>Niciun rezultat găsit.</div>";
        return;
    }

    results.forEach((s, index) => {
        const item = document.createElement('div');
        
        // Verificăm dacă acest post este cel care rulează în prezent (pentru egalizator)
        const isCurrentlyPlaying = (activeStationObject && activeStationObject.stream === s.stream && !audio.paused);
        
        item.className = `station-item ${isCurrentlyPlaying ? 'is-playing' : ''}`;
        item.setAttribute('data-name', s.name);

        // Folosim imaginea de profil sau fallback-ul dacă lipsește
        const thumbImg = s.img || FALLBACK_IMG;

        item.innerHTML = `
            <img src="${thumbImg}" class="station-thumb" onerror="this.src='${FALLBACK_IMG}'" loading="lazy">
            <div style="flex:1">
                <div class="station-name">${s.name}</div>
                <div class="station-desc">${s.desc}</div>
            </div>
            <div class="playing-icon">
                <span></span><span></span><span></span>
            </div>
        `;

        // GESTIONARE CLICK PE REZULTAT
        item.onclick = () => {
            // Sincronizăm indexul curent
            currentIdx = index;
            
            // Setăm obiectul activ IMEDIAT (pentru ca switchTab să aibă datele pregătite)
            activeStationObject = currentFilteredList[index];
            
            // Actualizăm textele din player (Slide-urile Prev/Current/Next)
            updateSliderText();
            
            // Pornim redarea (true = autoPlay)
            loadStationInfo(currentIdx, true, false);
            
            // Update vizual instant în listă (clasa de "playing")
            document.querySelectorAll('.station-item').forEach(el => el.classList.remove('is-playing'));
            item.classList.add('is-playing');

            // --- COMUTARE AUTOMATĂ LA PLAYER ---
            // Această funcție va declanșa acum modificarea URL-ului corect
            switchTab('player');
        };
        
        list.appendChild(item);
    });

    // Resetăm scroll-ul listei la început
    if (scrollContainer) scrollContainer.scrollTop = 0;
}






/** --- ENGINE DE CURĂȚARE TEXT (ULTRA SCRUBBER v8.1) --- **/
function fixEncoding(str) {
    if (!str) return "";
    try {
        // Dacă conține deja caractere chirilice, nu forțăm re-encodarea (evităm distrugerea textului)
        if (/[а-яА-ЯёЁ]/.test(str)) return str;
        // Altfel, încercăm să reparăm diacriticele românești (mojibake)
        return decodeURIComponent(escape(str));
    } catch (e) { return str; }
}

function decodeEntities(str) {
    if (!str) return "";
    const txt = document.createElement("textarea");
    txt.innerHTML = str;
    return txt.value;
}

function fixCase(str) {
    // Dacă tot textul e CAPS, îl facem Sentence case pentru aspect premium
    if (str.length > 2 && str === str.toUpperCase()) {
        return str.charAt(0) + str.slice(1).toLowerCase();
    }
    return str;
}

/** --- ENGINE DE CURĂȚARE TEXT (ULTRA SCRUBBER v8.2) --- **/

function removeDuplicateNames(text) {
    let parts = text.split(/[,，|\-\u2013\u2014\/]|feat\.|ft\.|&| x /gi);
    let cleanParts = [];
    let seenNormalized = [];

    parts.forEach(p => {
        // Înlocuim orice spațiu alb multiplu cu unul singur folosind Regex \s+
        let original = fixCase(p.trim().replace(/\s+/g, ' '));
        let norm = original.toLowerCase()
                           .normalize("NFD")
                           .replace(/[\u0300-\u036f]/g, "")
                           .replace(/[^a-z0-9а-яё]/gi, "");

        if (norm.length < 2) return;
        let isDuplicate = seenNormalized.some(prev => norm.includes(prev) || prev.includes(norm));
        if (!isDuplicate) {
            seenNormalized.push(norm);
            cleanParts.push(original);
        }
    });
    return cleanParts.join(' - ');
}


/** --- ENGINE DE CURĂȚARE TEXT (ULTRA SCRUBBER v8.4) --- **/

function analyticalClean(artist, title) {
    let a = decodeEntities(fixEncoding(artist || "")).trim();
    let t = decodeEntities(fixEncoding(title || "")).trim();

    const garbage = [/Official\s*Video/gi, /Official\s*Audio/gi, /Cat\s*Music/gi, /Roton\s*Music/gi, /Global\s*Records/gi, /Premiere/gi, /Lyrics/gi, /Video/gi, /Audio/gi, /Muzica/gi, /HD/gi, /Radio\s*Edit/gi];

    let cleanA = a.replace(/\(.*?\)|\[.*?\]|\{.*?\}/g, "");
    let cleanT = t.replace(/\(.*?\)|\[.*?\]|\{.*?\}/g, "");
    
    garbage.forEach(word => {
        cleanA = cleanA.replace(word, "");
        cleanT = cleanT.replace(word, "");
    });

    let rawCombined = (cleanA && cleanT) ? `${cleanA} - ${cleanT}` : (cleanA || cleanT);
    let final = removeDuplicateNames(rawCombined);

    // --- ZONA DE CURĂȚARE AVANSATĂ ---
    
    // 1. Elimină prefixul "KISS FM -"
    final = final.replace(/^kissfm\s*[\-\–\--\:]*\s*/gi, "");
    
    // 2. Elimină ghilimelele
    final = final.replace(/["""„«»]/g, ""); 

    // 3. ELIMINĂ AMBELE TIPURI DE BARE (Standard | și Full-width ｜)
    final = final.replace(/[|｜]/g, "");

    // 4. CURĂȚARE SPAȚII ȘI FINISAJE
    // Această linie transformă orice grup de spații (chiar și 10 la rând) într-unul singur
    final = final.replace(/\s+/g, ' ');

    return final.replace(/\s*-\s*-+\s*/g, ' - ') 
                .replace(/-+/g, '-')             
                .replace(/^[\s\-\.\/|｜]+|[\s\-\.\/|｜]+$/g, "") 
                .trim() || "Live Stream";
}

async function fetchAlbumArt(title, stationRef) {
    if (!title || title.length < 3 || title === "Live Stream") return;

    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(title)}&entity=song&limit=1`);
        const data = await res.json();
        
        if (data.results && data.results.length > 0) {
            // Luăm URL-ul de înaltă rezoluție de la iTunes
            const rawItunesImg = data.results[0].artworkUrl100.replace('100x100bb.jpg', '500x500bb.jpg');
            
            // Îl trecem prin proxy pentru WebP și compresie
            const highResImg = getOptimizedImg(rawItunesImg) || rawItunesImg;
            
            // Salvăm în obiectul stației pentru referință viitoare
            stationRef.img = highResImg;
            
            // Update imagine în LISTĂ (dacă stația este vizibilă în tab-ul curent)
            const stationThumb = document.querySelector(`.station-item[data-name="${stationRef.name}"] .station-thumb`);
            if (stationThumb) {
                stationThumb.src = highResImg;
            }

            // Update în PLAYER dacă este postul activ în acest moment
            if (activeStationObject && activeStationObject.name === stationRef.name) {
                updateArtUI(highResImg);
                updateMediaSession();
            }
        }
    } catch (e) { 
        console.log("iTunes Sync Error:", e); 
    }
}






async function fetchMetadata(url, station) {
    // Ignorăm posturile fără metadata (opțional)
    if (url.includes("emisiunivechi") && !url.includes(".xspf")) return;

    let newTitle = "";

    // VERIFICARE: Dacă este un post "Owned", citim din fișierul .xspf
    if (url.includes("sergiumusic.duckdns.org")) {
        try {
            // Construim URL-ul către fișierul .xspf (ex: /hope devine /hope.xspf)
            const xspfUrl = url.endsWith('.xspf') ? url : `${url}.xspf`;
            
            const response = await fetch(xspfUrl);
            const xmlText = await response.text();
            
            // Folosim DOMParser pentru a extrage titlul din XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const titleNode = xmlDoc.querySelector("trackList track title");
            
            if (titleNode) {
                newTitle = analyticalClean("", titleNode.textContent);
            }
        } catch (e) { 
            console.error("Error reading XSPF:", e); 
            // Fallback la metoda veche dacă XSPF e indisponibil
        }
    } 
    
    // LOGICA PENTRU POSTURI EXTERNE (Icecast/Icy)
    if (!newTitle) {
        try {
            const response = await fetch(url, { headers: { "Icy-MetaData": "1" } });
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            const metaInt = parseInt(response.headers.get("icy-metaint"));
            if (metaInt) {
                let buffer = new Uint8Array();
                let bytesRead = 0;
                while (bytesRead < metaInt + 500) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    let temp = new Uint8Array(buffer.length + value.length);
                    temp.set(buffer); temp.set(value, buffer.length); buffer = temp;
                    bytesRead += value.length;
                    if (buffer.length >= metaInt + 1) {
                        let mLen = buffer[metaInt] * 16;
                        if (buffer.length < metaInt + 1 + mLen) continue;
                        let mStr = decoder.decode(buffer.slice(metaInt + 1, metaInt + 1 + mLen));
                        let match = mStr.match(/StreamTitle='([^']*)'/);
                        if (match && match[1]) {
                            newTitle = analyticalClean("", match[1].replace(/;/g, "")); 
                        }
                        break;
                    }
                }
                reader.cancel();
            }
        } catch(e) { console.log("Error external meta"); }
    }

    // Actualizare UI dacă titlul s-a schimbat
    if (newTitle && station.desc !== newTitle) {
        station.desc = newTitle;
        updateStationUI(station.name, newTitle);
        fetchAlbumArt(newTitle, station);
    }
}

function loadStationInfo(idx, sp = true, skipArt = false, isInitial = false) {
    if (!currentFilteredList || currentFilteredList.length === 0) return;
    const s = currentFilteredList[idx];
    if (!s) return;

    if (sp) stations.forEach(st => st.isInitialBgSource = false);
    activeStationObject = s; 

    // Fade Out forțat la schimbarea postului
    const searchBtn = document.querySelector('.search-trigger-btn');
    if (searchBtn) searchBtn.classList.remove('is-visible');

    if (isInitial) {
        const art1 = document.getElementById('player-img-1');
        const art2 = document.getElementById('player-img-2');
        if (activeArtLayer === 1) art1.src = s.img || FALLBACK_IMG;
        else art2.src = s.img || FALLBACK_IMG;
    } else {
        if (sp || !skipArt) updateArtUI(s.img || FALLBACK_IMG);
    }

    if (metadataInterval) clearInterval(metadataInterval);
    audio.src = s.stream;

    setTimeout(() => { 
        fetchMetadata(s.stream, s); 
        metadataInterval = setInterval(() => fetchMetadata(s.stream, s), 15000); 
    }, 3000);

    if(sp) { 
        updateUI('loading'); 
        audio.play().catch(() => updateUI(false)); 
    }
    updateMediaSession();
    
    // Verificăm vizibilitatea (dacă metadata existau deja, se face Fade In)
    updateSearchBtnVisibility();
}














function togglePlay() { 
    if (!audio.paused) {

        if (audio.src && activeStationObject && audio.src === activeStationObject.stream) {

function updateUI(state) { 
    const b = document.getElementById('play-trigger');
    const f = document.getElementById('fab-play-pause');
    if(!b && !f) return;
    const icons = { play: 'play', pause: 'pause', loading: 'loader-2' };
    let currentIcon = state === 'loading' ? icons.loading : (state === true ? icons.pause : icons.play);
    [b, f].forEach(el => {
        if(!el) return;
        el.innerHTML = `<i data-lucide="${currentIcon}" ${currentIcon === 'loader-2' ? 'class="spin"' : 'fill="currentColor"'} ></i>`;
        state === true ? el.classList.add('playing') : el.classList.remove('playing');
    });
    document.querySelectorAll('.station-item').forEach(item => {
        item.classList.toggle('is-playing', (state === true || state === 'loading') && activeStationObject && item.getAttribute('data-name') === activeStationObject.name);

function updateMediaSession() {
    if ('mediaSession' in navigator && activeStationObject) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: activeStationObject.desc || "Live",
            artist: activeStationObject.name,
            album: "Sergiu FM",
            artwork: [
                { 
                    src: activeStationObject.img || FALLBACK_IMG, 
                    sizes: '512x512', 
                    type: 'image/png' 
                }
            ]
        });

        // --- ADAUGĂ ACESTE LINII PENTRU CONTROLUL DIN EXTERIOR ---
        
        // Butonul de Play
        navigator.mediaSession.setActionHandler('play', () => {
            audio.play();
            updateUI(true);
        });

        // Butonul de Pause
        navigator.mediaSession.setActionHandler('pause', () => {
            audio.pause();
            updateUI(false);
        });

        // Butonul de Next (Următorul post)
        navigator.mediaSession.setActionHandler('nexttrack', () => {
            next(); // Apelează funcția ta existentă
        });

        // Butonul de Previous (Postul anterior)
        navigator.mediaSession.setActionHandler('previoustrack', () => {
            prev(); // Apelează funcția ta existentă
        });
        
        // Opțional: Oprire (Stop)
        navigator.mediaSession.setActionHandler('stop', () => {
            audio.pause();
            updateUI(false);
        });
    }
}

function transliterate(t) {
    if (!t) return "";
    let r = t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const map = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'};
    r = r.split('').map(c => map[c] || c).join('');
    return r.replace(/[^a-z0-9]/g, '');
}

function setupSwipe() {
    const zones = [document.getElementById('swipe-zone-art'), document.getElementById('swipe-zone-text')];
    zones.forEach(z => {
        z.addEventListener('touchstart', e => { 
            if (isTransitioning) return; // Blochează swipe dacă se mișcă deja
            startX = e.touches[0].clientX; 
            isDragging = true; 
            wrapper.style.transition = 'none'; 
        }, {passive: true});

        z.addEventListener('touchmove', e => { 
            if (!isDragging || isTransitioning) return; 
            const d = e.touches[0].clientX - startX; 
            wrapper.style.transform = `translateX(calc(-33.333% + ${(d / window.innerWidth) * 33}%))`; 
        }, {passive: true});

        z.addEventListener('touchend', e => { 
            if (!isDragging || isTransitioning) return; 
            isDragging = false;
            const d = e.changedTouches[0].clientX - startX;
            if (d > 60) prev(); 
            else if (d < -60) next(); 
            else { 
                wrapper.style.transition = 'transform 0.4s ease'; 
                wrapper.style.transform = 'translateX(-33.333%)'; 
            }
        });
    });
}


function setupFabSwipe() {
    const fab = document.getElementById('fab-play-pause');
    let fSX, fSY;
    
    fab.addEventListener('touchstart', e => { 
        fSX = e.touches[0].clientX; 
        fSY = e.touches[0].clientY; 
    }, {passive: true});

    fab.addEventListener('touchend', e => {
        const dX = e.changedTouches[0].clientX - fSX;
        const dY = e.changedTouches[0].clientY - fSY;
        
        if (Math.abs(dX) > 30 || Math.abs(dY) > 30) {
            let direction = '';
            
            // Dacă e prima intrare și indexul e resetat, îl pregătim pentru primul post
            if (currentIdx === -1) currentIdx = -1; 

            if (dY > 30 || dX < -30) {
                next(); // Aceasta va apela acum loadStationInfo(idx, true...)
                direction = 'skip-forward';
            } 
            else if (dY < -30 || dX > 30) {
                prev();
                direction = 'skip-back';
            }

            if (direction) {
                updateFabVisuals(direction);
                if (navigator.vibrate) navigator.vibrate(40);
            }
        }
    }, {passive: true});
}


function updateFabVisuals(iconName) {
    const fab = document.getElementById('fab-play-pause');
    
    // 1. Schimbăm iconița imediat (Skip)
    fab.innerHTML = `<i data-lucide="${iconName}"></i>`;
    lucide.createIcons();
    
    // 2. Adăugăm un efect vizual de feedback (opțional, dar ajută)
    fab.style.transform = 'scale(0.85)';
    
    // 3. Revenim la starea normală (Play/Pause) după 800ms
    setTimeout(() => {
        const stateIcon = !audio.paused ? 'pause' : 'play';
        fab.innerHTML = `<i data-lucide="${stateIcon}" fill="currentColor"></i>`;
        lucide.createIcons();
        fab.style.transform = ''; // Revenim la scara normală (sau cea de puls)
    }, 800);
}



async function updateAllOwnedStations() {
    // Filtrăm doar stațiile deținute
    const ownedStations = stations.filter(s => s.stream.includes("sergiumusic.duckdns.org"));

    for (const station of ownedStations) {
        // Apelăm fetchMetadata care acum știe să citească .xspf
        fetchMetadata(station.stream, station);
    }
    
    // Actualizăm slider-ul după ce terminăm bucla
    setTimeout(updateSliderText, 500);
}






/** --- FUNCȚIE PENTRU FUNDAL RANDOM LA PORNIRE --- **/
async function applyRandomItunesCover() {
    const keywords = ["Hits 2026", "Dance Music", "Pop Hits", "Top Charts", "Summer Vibes", "Deep House"];
    const randomKey = keywords[Math.floor(Math.random() * keywords.length)];
    
    try {
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(randomKey)}&entity=song&limit=20`);
        const data = await res.json();
        
        if (data.results && data.results.length > 0) {
            const randomTrack = data.results[Math.floor(Math.random() * data.results.length)];
            
            // 1. Luăm URL-ul de rezoluție mare (600x600 sau 1000x1000 pentru fundal)
            const rawImg = randomTrack.artworkUrl100.replace('100x100bb.jpg', '600x600bb.jpg');
            
            // 2. Îl optimizăm prin proxy (WebP, compresie 80%)
            // Folosim dimensiuni puțin mai mari aici (w=800) pentru că e fundalul principal
          const highResImg = `https://images.weserv.nl/?url=${encodeURIComponent(rawImg)}&w=350&q=20&output=webp`;            
            const bg1 = document.getElementById('bg-layer-1');
            const art1 = document.getElementById('player-img-1');
            
            if (bg1) {
                bg1.style.backgroundImage = `url(${highResImg})`;
                bg1.style.opacity = "1";
            }
            if (art1) {
                art1.src = highResImg;
            }
        } else {
            // Dacă iTunes nu returnează nimic, activăm stratul de fundal cu imaginea default
            document.getElementById('bg-layer-1').style.opacity = "1";
        }
    } catch (e) {
        console.log("Eroare fundal random:", e);
        // Fallback de siguranță: afișăm fundalul existent (chiar dacă e cel de rezervă)
        const bg1 = document.getElementById('bg-layer-1');
        if (bg1) bg1.style.opacity = "1";
    }
}


function updateStationUI(name, desc) {
    const items = document.querySelectorAll(`.station-item[data-name="${name}"]`);
    items.forEach(item => {
        const dEl = item.querySelector('.station-desc');
        if (dEl) dEl.innerText = desc;
    });

    if (activeStationObject && activeStationObject.name === name) {
        const pDesc = document.querySelector('#slide-current p');
        if (pDesc) pDesc.innerText = desc;
        
        // Aici declanșăm animația de Fade In / Fade Out
        updateSearchBtnVisibility();
    }
}




function openExternalSearchPopup() {
    const playlistOption = document.getElementById('search-option-playlist');
    const playlistDivider = document.getElementById('playlist-divider');
    
    // Verificăm dacă obiectul stației are proprietatea "yt"
    if (activeStationObject && activeStationObject.yt) {
        playlistOption.style.display = 'flex';
        playlistDivider.style.display = 'block'; // Aici îl facem vizibil
    } else {
        playlistOption.style.display = 'none';
        playlistDivider.style.display = 'none'; // Aici îl ascundem
    }

    document.getElementById('searchPopup').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('searchPopup').classList.add('active');
    }, 10);
}





function closeExternalSearchPopup(e) {
    document.getElementById('searchPopup').classList.remove('active');
    setTimeout(() => {
        document.getElementById('searchPopup').style.display = 'none';
    }, 300);
}

function redirectToSearch(platform) {
    if (platform === 'playlist') {
        if (activeStationObject && activeStationObject.yt) {
            window.open(activeStationObject.yt, '_blank');
        }
        closeExternalSearchPopup();
        return;
    }

    if (!activeStationObject || !activeStationObject.desc || activeStationObject.desc.includes("Radio Player")) {
        alert("Melodia nu a fost identificată încă.");
        return;
    }

    // 1. Curățare totală: eliminăm cratimele (-) și plusurile (+) din textul original
    let cleanText = activeStationObject.desc
        .replace(/[+\-]/g, ' ')   // Înlocuiește + și - cu spațiu
        .replace(/\s+/g, ' ')     // Elimină spațiile duble
        .trim();

    // 2. Encodăm pentru URL folosind %20 (spațiu real)
    const queryForWeb = encodeURIComponent(cleanText).replace(/%20/g, '%20');

    let url = "";

    switch(platform) {
        case 'spotify':
            // Link-ul specific cerut de tine
            url = `spotify:search:${queryForWeb}`; 
            setTimeout(() => { 
                window.location.href = `https://open.spotify.com/search/results/${queryForWeb}`; 
            }, 800);
            break;
            
        case 'apple':
            url = `music://search?term=${queryForWeb}`;
            setTimeout(() => { 
                window.location.href = `https://music.apple.com/search?term=${queryForWeb}`; 
            }, 800);
            break;
            
        case 'ytmusic':
            url = `youtubemusic://search?q=${queryForWeb}`;
            setTimeout(() => { 
                window.location.href = `https://music.youtube.com/search?q=${queryForWeb}`; 
            }, 800);
            break;
            
        case 'youtube':
            url = `youtube://www.youtube.com/results?search_query=${queryForWeb}`;
            setTimeout(() => { 
                window.location.href = `https://www.youtube.com/results?search_query=${queryForWeb}`; 
            }, 800);
            break;
            
        case 'deezer':
            url = `deezer://www.deezer.com/search/${queryForWeb}`;
            setTimeout(() => { 
                window.location.href = `https://www.deezer.com/search/${queryForWeb}`; 
            }, 800);
            break;
    }

    window.location.href = url;
    closeExternalSearchPopup();
}




function updateSearchBtnVisibility() {
    const searchBtn = document.querySelector('.search-trigger-btn');
    if (!searchBtn || !activeStationObject) return;

    // Verificăm dacă descrierea actuală este diferită de cea originală (implicită)
    // și dacă nu este un text generic de tip "Radio Player"
    const hasMetadata = activeStationObject.desc !== activeStationObject.originalDesc && 
                        activeStationObject.desc !== "Radio Player" &&
                        activeStationObject.desc !== "LIVE STREAM";

    if (hasMetadata) {
        searchBtn.classList.add('is-visible');
    } else {
        searchBtn.classList.remove('is-visible');
    }
}








async function init() {
    const navBar = document.getElementById('main-nav');
    const fabPlay = document.getElementById('fab-play-pause');
    const fabSearch = document.getElementById('fab-search');

    let fullPath = window.location.pathname.split('/').filter(s => s.length > 0).join('/');
    if (!fullPath && window.location.search) {
        fullPath = decodeURIComponent(window.location.search.substring(1));
    }
    
    let autoFound = null;

    if (fullPath && ENABLE_DIRECT_LINKS) {
        // CAZUL 1: LINK EXTERN (Decoder activat)
        if (fullPath.startsWith('url/') || fullPath.startsWith('url~')) {
            const decodedData = decodePathToStream(fullPath);
            autoFound = {
                name: decodedData.name,
                stream: decodedData.stream,
                img: FALLBACK_IMG,
                desc: "LIVE STREAM",
                isAll: true,
                isSearch: true 
            };
            renderList('mine', document.getElementById('tab-mine'));
            currentFilteredList = [autoFound, ...currentFilteredList];
            currentIdx = 0;
        } 
        // CAZUL 2: LINK IMPLICIT (Căutare în stațiile tale)
        else {
            const cleanTarget = transliterate(decodeURIComponent(fullPath)).toLowerCase().replace(/\s+/g, '');
            autoFound = stations.find(s => {
                const cleanStationName = transliterate(s.name).toLowerCase().replace(/\s+/g, '');
                return cleanStationName === cleanTarget;
            });

            if (autoFound) {
                const mode = autoFound.isMine ? 'mine' : 'all';
                renderList(mode, document.getElementById('tab-' + mode));
                currentIdx = currentFilteredList.findIndex(s => s.name === autoFound.name);
            }
        }
    }

    // --- FINALIZARE SETUP ---
    await applyRandomItunesCover();

    if (autoFound) {
        switchTab('player');
        loadStationInfo(currentIdx, true, false, false);
    } else {
        renderList('mine', document.getElementById('tab-mine'));
        currentIdx = 0;
        loadStationInfo(currentIdx, true, false, true); 
        if (ENABLE_DIRECT_LINKS) window.history.replaceState({}, "", "/");
    }

    document.body.classList.add('app-ready');
    
    setTimeout(() => {
        if (navBar) navBar.classList.add('visible');
        const isListActive = document.getElementById('list-view').style.display !== 'none';
        if (isListActive) {
            if (fabPlay) { fabPlay.style.display = 'flex'; fabPlay.classList.add('visible'); }
            if (fabSearch) { fabSearch.style.display = 'flex'; fabSearch.classList.add('visible'); }
        }
    }, 400);

    updateSliderText();
    setupSwipe();
    setupFabSwipe();
    await updateAllOwnedStations(); 

    setInterval(() => {
        updateAllOwnedStations();
        stations.forEach((s, i) => {
            if (!s.stream.includes("sergiumusic.duckdns.org")) {
                setTimeout(() => fetchMetadata(s.stream, s), i * 200);
            }
        });
    }, 20000);

    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
}








const ENABLE_DIRECT_LINKS = true;


init();
</script>
