<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sergiu FM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="icon" href="favicon.png" type="image/png">
<link rel="apple-touch-icon" href="icon-180.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sergiu FM">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
    --accent: #ff5e3a;
    --glass: rgba(255, 255, 255, 0.1);
    --bg-dark: #000000;
}

* { 
    box-sizing: border-box; 
    margin: 0; padding: 0; 
    font-family: 'Inter', sans-serif; 
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    overscroll-behavior: none;
}

body { 
    background: var(--bg-dark); 
    color: white; 
    height: 100dvh; 
    width: 100vw;
    overflow: hidden;
    display: flex; 
    justify-content: center;
    touch-action: none; /* Previne scroll-ul de sistem pe fundal */
}

.app-container {
    width: 100%; max-width:395px; height: 100%; position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    /* Gestionăm spațiul pentru butoanele de jos de pe iPhone */
    padding-bottom: env(safe-area-inset-bottom);
}

.bg-blur {
    position: absolute; 
    /* Fundalul urcă până sus de tot sub status bar */
    top: -5%; left: -10%; width: 120%; height: 110%;
    background-size: cover; 
    background-position: center;
    filter: blur(40px) brightness(0.4) saturate(1.2);
    z-index: 0; 
    opacity: 0;
    transition: opacity 1.5s ease-in-out;
    will-change: opacity;
}

/* Modificat pentru transparență sus și spațiu pentru ceas */
.header-tabs { 
    position: relative; z-index: 10; 
    padding: calc(env(safe-area-inset-top) + 15px) 20px 10px; 
    display: flex; gap: 10px; overflow-x: auto; 
    background: transparent;
}

.tab { 
    background: var(--glass); 
    padding: 8px 18px; 
    border-radius: 20px; 
    font-size: 13px; 
    backdrop-filter: blur(10px); 
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); 
    cursor: pointer; 
    white-space: nowrap;
    font-weight: 800;
    transition: background-color 0.6s cubic-bezier(0.23, 1, 0.32, 1), transform 0.2s ease;
}
.tab.active { background: var(--accent); border-color: transparent; font-weight: 900; }

.content { 
    position: relative; 
    z-index: 10; 
    flex: 1; 
    padding: 0 20px 140px 20px; 
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch; 
    touch-action: pan-y;
}

.station-item { 
    display: flex; align-items: center; padding: 15px 0; border-bottom: 1px solid transparent;
    border-image: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent) 1; 
}

.station-thumb { 
    width: 55px; height: 55px; border-radius: 12px; margin-right: 15px; 
    object-fit: cover; background: #111; 
}

.station-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
.station-desc { font-size: 11px; color: #b3b3b3; text-transform: uppercase; }

#player-view { display: none; position: relative; z-index: 10; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding-top: env(safe-area-inset-top); padding-bottom: 100px; }

.art-container { width: 250px; height: 250px; position: relative; margin-bottom: 25px; }
.main-art { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    border-radius: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.7); object-fit: cover; 
    background: #111; transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
.art-hidden { opacity: 0; transform: scale(0.95); }
.art-visible { opacity: 1; transform: scale(1); }

.track-viewport { width: 100%; overflow: hidden; margin-bottom: 30px; position: relative; }
.track-slider-wrapper { display: flex; width: 300%; transform: translateX(-33.333%); will-change: transform; }
.track-info-slide { width: 33.333%; text-align: center; padding: 0 45px; flex-shrink: 0; }
.track-info-slide h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; line-height: 1.3; }
.track-info-slide p { color: #b3b3b3; font-size: 13px; text-transform: uppercase; }

.main-controls { display: flex; align-items: center; gap: 35px; margin-bottom: 20px; }
.btn-round { 
    background: var(--glass); width: 58px; height: 58px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; 
    backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); color: white;
}
.btn-play { background: #fff; color: #000; width: 75px; height: 75px; }
.btn-play.playing { background: var(--accent); color: #fff; box-shadow: 0 0 30px rgba(255, 94, 58, 0.6); }

.nav-bar { 
    position: absolute; bottom: calc(env(safe-area-inset-bottom) + 20px); left: 25px; right: 25px; z-index: 50; 
    background: rgba(25,25,25,0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border-radius: 40px; display: flex; justify-content: space-around; padding: 8px; 
    border: 1px solid rgba(255,255,255,0.08); opacity: 0; transform: translateY(10px); transition: all 0.5s ease;
}
.nav-bar.visible { opacity: 1; transform: translateY(0); }
.nav-bar::before { content: ''; position: absolute; top: 8px; left: 8px; width: calc(50% - 8.5px); height: calc(100% - 16px); background: rgba(255, 255, 255, 0.08); border-radius: 35px; transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); z-index: -1; }
.nav-bar.on-radio::before { transform: translateX(100%); }
.nav-bar.on-player::before { transform: translateX(0%); }

.nav-link { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 0; width: 50%; color: #777; cursor: pointer; font-size: 11px; }
.nav-link.active { color: #fff; }
.nav-link.active i, .nav-link.active svg { color: var(--accent); }

.fab { 
    position: absolute; bottom: calc(env(safe-area-inset-bottom) + 115px); right: 31px; 
    background: #fff; color: #000; width: 56px; height: 56px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 25px rgba(0,0,0,0.3); z-index: 15; 
    opacity: 0; transform: translateY(20px); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.fab.visible { opacity: 1; transform: translateY(0); }

/* Stiluri Equalizer Listă */
.playing-icon { display: none; align-items: flex-end; gap: 2px; width: 20px; height: 20px; margin-left: 10px; }
.station-item.is-playing .playing-icon { display: flex; }
.playing-icon span { width: 3px; background: var(--accent); border-radius: 2px; animation: bounce 0.5s infinite alternate; }
@keyframes bounce { from { height: 5px; } to { height: 18px; } }
.station-item.is-playing .station-name { color: var(--accent); }

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.player-yt-link { position: absolute; right: 11px; bottom: 11px; z-index: 35; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); border-radius: 16px; padding: 4px; opacity: 0.8; }
.player-yt-link img { width: 29px; height: 29px; display: block; }
.yt-hidden { display: none; }
</style>
</head>
<body oncontextmenu="return false;">
<div class="app-container">
    <div class="bg-blur" id="bg-layer-1"></div>
    <div class="bg-blur" id="bg-layer-2"></div>

    <div id="list-view" style="height:100%; display:flex; flex-direction:column;">
        <div class="header-tabs">
            <div class="tab" id="tab-all" onclick="renderList('all', this)">All</div>
            <div class="tab" id="tab-fav" onclick="renderList('fav', this)">Favorites</div>
            <div class="tab active" id="tab-mine" onclick="renderList('mine', this)">Owned</div>
            <div class="tab" id="tab-russian" onclick="renderList('russian', this)">Russian</div>
        </div>
        <div class="content" id="stations-list"></div>
        <div class="fab" id="fab-play-pause" onclick="togglePlay()">
            <i data-lucide="play" fill="currentColor"></i>
        </div>
    </div> 

    <div id="player-view">
        <div class="art-container" id="swipe-zone-art">
            <img src="" class="main-art art-visible" id="player-img-1" onerror="this.src=FALLBACK_IMG">
            <img src="" class="main-art art-hidden" id="player-img-2" onerror="this.src=FALLBACK_IMG">
            <a id="player-yt-btn" href="#" target="_blank" class="player-yt-link yt-hidden">
                <img src="https://cdn-icons-png.flaticon.com/512/10610/10610674.png" alt="YouTube">
            </a>
        </div>
        <div class="track-viewport" id="swipe-zone-text">
            <div class="track-slider-wrapper" id="info-wrapper">
                <div class="track-info-slide" id="slide-prev"><h2>Post Anterior</h2><p>Gen</p></div>
                <div class="track-info-slide" id="slide-current"><h2>Alege un post</h2><p>Radio Player</p></div>
                <div class="track-info-slide" id="slide-next"><h2>Post Următor</h2><p>Gen</p></div>
            </div>
        </div>
        <div class="main-controls">
            <div class="btn-round" id="btn-prev" onclick="prev()"><i data-lucide="skip-back" fill="currentColor"></i></div>
            <div class="btn-round btn-play" id="play-trigger" onclick="togglePlay()"><i data-lucide="play" fill="currentColor"></i></div>
            <div class="btn-round" id="btn-next" onclick="next()"><i data-lucide="skip-forward" fill="currentColor"></i></div>
        </div>
    </div>

    <div class="nav-bar on-radio" id="main-nav">
        <div class="nav-link" id="nav-player" onclick="switchTab('player')">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
            <span>Player</span>
        </div>
        <div class="nav-link active" id="nav-list" onclick="switchTab('list')">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></svg>
            <span>Radio</span>
        </div>
    </div>
</div>

<audio id="audio-engine" preload="auto" crossorigin="anonymous"></audio>

<script>
// --- VARIABILE ȘI CONFIGURAȚIE ---
let currentIdx = 0;
let currentFilteredList = []; 
let activeBGLayer = 1;
let activeArtLayer = 1; 
let startX = 0;
let activeStationObject = null;
let isDragging = false;
let metadataInterval = null;
let isTransitioning = false;

const audio = document.getElementById('audio-engine');
const wrapper = document.getElementById('info-wrapper');
const FALLBACK_IMG = "https://store-images.s-microsoft.com/image/apps.54675.13982720394888960.16320d2b-98f6-4b3b-af8d-f33140cf192a.778f4c59-a76c-44c0-82f7-bd7357649848";

const stations = [
    { name: "Heart 10s", stream: "https://media-ice.musicradio.com/Heart10sMP3", img: "https://images.weserv.nl/?url=www.globalplayer.com/assets/track-placeholders/heart10s.png", desc: "POP, HITS, CHART", isFav: true, isAll: true },
    { name: "Kiss 10s", stream: "https://dc.digi.live.kissfm.ro/kiss.hits.from.the.10s/listen.m3u", img: "https://api.kissfm.ro/resized/streams/homepage/2025/01/10/cover-kiss-hits-from-the-10s_6210a8bb4e6b58d8b6d2c0342721cdb9.png", desc: "HITS FROM THE 10S", isFav: true, isAll: true },
    { name: "Millenium Hits", stream: "https://dc.digi.live.kissfm.ro/milleniumhits", img: "https://api.kissfm.ro/resized/streams/homepage/2024/10/07/homepage-logo-kiss-millenium-hits_bd81e49f11f3edfff722aecb28f9ae34.png", desc: "KISS MILLENIUM HITS", isAll: true },
    { name: "ONE FM DANCE", stream: "https://live.onefm.ro/onefm.aacp", img: "https://onefm.es/wp-content/uploads/2023/09/LOGO-2025.jpg", desc: "DANCE, HOUSE, TECHNO", isAll: true },
    { name: "PRO DJ RADIO", stream: "http://live.prodjradio.net:8000/;?type=http", img: "https://yt3.googleusercontent.com/ytc/AIdro_kzkPgiLvOOACJ8JsiVWcgjbDaDftezak5j9Pv9KAp2cg=s900-c-k-c0x00ffffff-no-rj", desc: "DJ MIX, CLUB, DANCE", isAll: true },
    { name: "Radio Record", stream: "https://radiorecord.hostingradio.ru/rus96.aacp", img: "https://is1-ssl.mzstatic.com/image/thumb/Podcasts221/v4/0e/fe/53/0efe532a-3cee-6c89-1d8d-c9f18284c0f2/mza_5165669991707061934.jpg/1200x1200bf-60.jpg", desc: "RECORD RUSSIAN MIX", isRussian: true, isAll: true },
    { name: "Маруся ФМ", stream: "https://listen.vdfm.ru:8000/marusya", img: "https://cover.marus.fm/cover/default.jpg", desc: "RUSSIAN POP MIX", isRussian: true, isAll: true },
    { name: "Muzică 10s", stream: "https://sergiumusic.duckdns.org/muzicaveche", img: "https://mosaic.scdn.co/640/ab67616d00001e021badc66d1c9de6a98d376946ab67616d00001e022b605014f0cf0ca5e3c46b64ab67616d00001e02baa7a73c40a30e2c780c6841ab67616d00001e02ce26853f4b61f0924446f683", desc: "Sergiu | Childhood", isMine: true, isFav: true, isAll: true },
    { name: "Hope", stream: "https://sergiumusic.duckdns.org/hope", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8aX5i1Sosu19dYGhKZwB3XHN2aFFLnuPUToBVDQVjOplOdpr5q3ZxEy8&s=10", desc: "Sergiu | Lovefool Pop", isMine: true, isFav: true, isAll: true },
    { name: "Manele", stream: "https://sergiumusic.duckdns.org/manele", img: "https://image-cdn-ak.spotifycdn.com/image/ab67706c0000da842dd25b4dde6d46673b953a6e", desc: "Sergiu | Gypsy Team", isMine: true, isAll: true }
];

stations.forEach(s => { s.originalDesc = s.desc; s.originalImg = s.img; });

// --- FUNCȚII CORE ---
function togglePlay() { 
    if (audio.paused) {
        if (!audio.src || audio.src === window.location.href) loadStationInfo(currentIdx, true);
        else audio.play();
    } else audio.pause(); 
}

function updateUI(state) { 
    const b = document.getElementById('play-trigger');
    const f = document.getElementById('fab-play-pause');
    const icon = state === 'loading' ? 'loader-2' : (state === true ? 'pause' : 'play');
    
    [b, f].forEach(el => {
        if(!el) return;
        el.innerHTML = `<i data-lucide="${icon}" ${icon === 'loader-2' ? 'class="spin"' : 'fill="currentColor"'}></i>`;
        state === true ? el.classList.add('playing') : el.classList.remove('playing');
    });
    
    document.querySelectorAll('.station-item').forEach(item => {
        const isPlaying = (state === true || state === 'loading') && activeStationObject && item.getAttribute('data-name') === activeStationObject.name;
        item.classList.toggle('is-playing', isPlaying);
    });
    lucide.createIcons();
}

function loadStationInfo(idx, sp = true, isInitial = false) {
    const s = currentFilteredList[idx];
    if (!s) return;
    activeStationObject = s;

    if (!isInitial) {
        const bg1 = document.getElementById('bg-layer-1');
        const bg2 = document.getElementById('bg-layer-2');
        const nB = activeBGLayer === 1 ? bg2 : bg1;
        const cB = activeBGLayer === 1 ? bg1 : bg2;
        
        nB.style.backgroundImage = `url(${s.img || FALLBACK_IMG})`;
        nB.style.opacity = '1';
        cB.style.opacity = '0';
        activeBGLayer = activeBGLayer === 1 ? 2 : 1;

        const art1 = document.getElementById('player-img-1');
        const art2 = document.getElementById('player-img-2');
        const nA = activeArtLayer === 1 ? art2 : art1;
        const cA = activeArtLayer === 1 ? art1 : art2;
        
        nA.src = s.img || FALLBACK_IMG;
        nA.classList.replace('art-hidden', 'art-visible');
        cA.classList.replace('art-visible', 'art-hidden');
        activeArtLayer = activeArtLayer === 1 ? 2 : 1;
    }

    const ytBtn = document.getElementById('player-yt-btn');
    if (s.yt) { ytBtn.href = s.yt; ytBtn.classList.remove('yt-hidden'); } 
    else ytBtn.classList.add('yt-hidden');

    audio.src = s.stream;
    if(sp) audio.play().catch(e => console.log("Autoplay blocked"));
    updateSliderText();
}

function next() { 
    if (isTransitioning) return;
    currentIdx = (currentIdx + 1) % currentFilteredList.length;
    animateTransition('next');
}

function prev() { 
    if (isTransitioning) return;
    currentIdx = (currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length;
    animateTransition('prev');
}

function animateTransition(dir) {
    isTransitioning = true;
    wrapper.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
    wrapper.style.transform = dir === 'next' ? 'translateX(-66.666%)' : 'translateX(0)';
    
    setTimeout(() => {
        wrapper.style.transition = 'none';
        loadStationInfo(currentIdx, !audio.paused);
        wrapper.style.transform = 'translateX(-33.333%)';
        isTransitioning = false;
    }, 400);
}

function updateSliderText() {
    const ids = ['slide-prev', 'slide-current', 'slide-next'];
    const indices = [(currentIdx - 1 + currentFilteredList.length) % currentFilteredList.length, currentIdx, (currentIdx + 1) % currentFilteredList.length];
    ids.forEach((id, i) => {
        const s = currentFilteredList[indices[i]];
        if(s) {
            document.querySelector(`#${id} h2`).innerText = s.name;
            document.querySelector(`#${id} p`).innerText = s.desc;
        }
    });
}

function switchTab(t) {
    const isPlayer = t === 'player';
    document.getElementById('list-view').style.display = isPlayer ? 'none' : 'flex';
    document.getElementById('player-view').style.display = isPlayer ? 'flex' : 'none';
    document.getElementById('nav-list').classList.toggle('active', !isPlayer);
    document.getElementById('nav-player').classList.toggle('active', isPlayer);
    document.getElementById('main-nav').className = `nav-bar visible on-${isPlayer ? 'player' : 'radio'}`;
    document.getElementById('fab-play-pause').classList.toggle('visible', !isPlayer);
}

function renderList(mode, el) {
    if (el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    const list = document.getElementById('stations-list');
    list.innerHTML = "";
    const filterKey = `is${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
    currentFilteredList = stations.filter(s => s[filterKey] || mode === 'all');
    
    currentFilteredList.forEach((s, idx) => {
        const item = document.createElement('div');
        item.className = 'station-item';
        item.setAttribute('data-name', s.name);
        item.innerHTML = `
            <img src="${s.img || FALLBACK_IMG}" class="station-thumb">
            <div style="flex:1">
                <div class="station-name">${s.name}</div>
                <div class="station-desc">${s.desc}</div>
            </div>
            <div class="playing-icon"><span></span><span></span><span></span></div>
        `;
        item.onclick = () => { currentIdx = idx; loadStationInfo(idx, true); };
        list.appendChild(item);
    });
    updateUI(!audio.paused);
}

// --- INITIALIZARE ---
function init() {
    renderList('mine', document.getElementById('tab-mine'));
    loadStationInfo(0, false, true);
    
    // Animatii intrare
    setTimeout(() => {
        document.getElementById('main-nav').classList.add('visible');
        document.getElementById('fab-play-pause').classList.add('visible');
        document.getElementById('bg-layer-1').style.opacity = '1';
    }, 500);

    // Swipe logic simplificat
    let startX = 0;
    document.getElementById('player-view').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('player-view').addEventListener('touchend', e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
    });

    audio.addEventListener('waiting', () => updateUI('loading'));
    audio.addEventListener('playing', () => updateUI(true));
    audio.addEventListener('pause', () => updateUI(false));
    
    lucide.createIcons();
}

window.onload = init;
</script>
</body>
</html>
