<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <title>Redirecționare Sergiu FM...</title>
    <script type="text/javascript">
        // 1. Obținem calea (ex: "/маруся%20фм")
        var path = window.location.pathname;
        
        // 2. Extragem ultimul segment și îl decodăm (Transformăm %20 în spațiu, etc.)
        var segments = path.split('/').filter(function(s) {
            return s.length > 0;
        });
        
        var station = segments.length > 0 ? decodeURIComponent(segments[segments.length - 1]) : "";

        // 3. Redirecționăm
        // Dacă avem "Маруся ФМ", rezultatul va fi: sergiumusic.ro/?Маруся ФМ
        // Scriptul din index.html va prelua acest text și va face transliterarea în "marusyafm"
        if (station) {
            window.location.replace(window.location.origin + '/?' + encodeURIComponent(station));
        } else {
            window.location.replace(window.location.origin);
        }
    </script>
</head>
<body>
    <p>Se încarcă stația radio...</p>
</body>
</html>
